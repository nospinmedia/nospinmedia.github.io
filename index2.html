<script>

const STORY  = 'https://nospin.media/story.html?story=';
const SHARE  = 'https://nospin.media/share.html?story=';

const TOPIC_LABELS = {
  politics:'Politics', economy:'Economy', legal:'Legal', health:'Health',
  science:'Science', ai:'AI', technology:'Technology', war:'War',
  military:'Military', crime:'Crime', environment:'Environment', world:'World'
};
const TOPICS_ORDER = ['politics','economy','legal','health','science','ai',
  'technology','war','military','crime','environment','world'];
const KW_IMG = {
  politics:'politics', economy:'economy', health:'health', legal:'court',
  war:'war', crime:'crime', science:'science', technology:'technology',
  ai:'ai', world:'world', environment:'environment', military:'military'
};

let allStories = [], activeTopic = 'all';
let _aff = null, _kw = null;

/* ── UTILS ── */
function timeSince(ds) {
  if (!ds) return '';
  const d = new Date(ds.includes('T') ? ds : ds + 'T12:00:00Z');
  const m = Math.floor((Date.now() - d) / 60000);
  if (m < 2)     return 'Just now';
  if (m < 60)    return m + 'm ago';
  if (m < 1440)  return Math.floor(m/60) + 'h ago';
  if (m < 2880)  return 'Yesterday';
  if (m < 10080) return Math.floor(m/1440) + 'd ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function stripMd(t) {
  return (t||'').replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1')
    .replace(/\\n/g,' ').replace(/\n/g,' ').trim();
}
function randSummary(s) {
  const opts=[s.social_bluesky,s.social_threads,s.social_facebook].filter(x=>x&&x.trim().length>20);
  if(opts.length) return opts[Math.floor(Math.random()*opts.length)];
  const r=stripMd(s.summary||''); return r.substring(0,200)+(r.length>200?'…':'');
}
function cleanHL(h) { return (h||'').replace(/\n/g,' — ').trim(); }
function pill(t, white) {
  if(white) return `<span class="pill" style="background:rgba(255,255,255,0.22);color:#fff;">${TOPIC_LABELS[t]||t}</span>`;
  return `<span class="pill tp-${t||'world'}">${TOPIC_LABELS[t]||t||'News'}</span>`;
}
function impDot(i) {
  if(!i) return '';
  return `<span class="imp-dot imp-${i}"></span>`;
}
function topBG(url, t) {
  const kw=KW_IMG[t]||'news';
  return `background-image:url('${IMG_S}${url}.jpg'),url('${IMG_K}${kw}.jpg');background-size:cover;background-position:center;`;
}
function topCls(t) { return `tp-bg-${t||'world'}`; }

/* ── SHARE ── */
function shareStory(id, btn) {
  const url = SHARE + id;
  if(navigator.share) { navigator.share({url}).catch(()=>{}); }
  else {
    navigator.clipboard.writeText(url).then(()=>{
      const o=btn.innerHTML; btn.innerHTML='✅';
      setTimeout(()=>btn.innerHTML=o,1800);
    }).catch(()=>window.open(url,'_blank'));
  }
}

/* ── CARD HTML ── */
function heroHTML(s) {
  const hl=cleanHL(s.headline), sum=randSummary(s), t=s.topic||'world';
  const ts=timeSince(s.date||s.posted_at), maj=s.importance==='major';
  return `
<div class="hero-card" onclick="window.location='${STORY}${s.url}'">
  <div class="hero-img-top ${topCls(t)}">
    <div class="hero-img-bg" style="${topBG(s.url,t)}"></div>
    <div class="hero-img-grad"></div>
    <div class="hero-img-pill">${pill(t,true)}</div>
    ${maj?`<div class="hero-img-badge">🔴 Breaking</div>`:''}
  </div>
  <div class="hero-body">
    <div class="hero-headline">${hl}</div>
    <div class="hero-summary" data-id="${s.url}">${sum}</div>
    <div class="hero-footer">
      <div class="hero-meta"><span class="hero-time">${impDot(s.importance)}${ts}</span></div>
      <div class="hero-actions">
        <button class="btn-share" onclick="event.stopPropagation();shareStory('${s.url}',this)">🔗 Share</button>
        <a class="btn-read" href="${STORY}${s.url}" onclick="event.stopPropagation()">Read More →</a>
      </div>
    </div>
  </div>
</div>`;
}

function cardHTML(s) {
  const hl=cleanHL(s.headline), sum=randSummary(s), t=s.topic||'world', ts=timeSince(s.date||s.posted_at);

  </div>
  <div class="card-body">
    <div class="card-headline">${hl}</div>
    <div class="card-summary" data-id="${s.url}">${sum}</div>
    <div class="card-footer">
      <span class="card-time">${impDot(s.importance)}${ts}</span>
      <div class="card-actions">
        <button class="btn-sm-share" onclick="event.stopPropagation();shareStory('${s.url}',this)">🔗</button>

      </div>
    </div>
  </div>
</div>`;
}

function textCardHTML(s) {
  const hl=cleanHL(s.headline), sum=randSummary(s), t=s.topic||'world', ts=timeSince(s.date||s.posted_at);
  return `
<div class="text-card" onclick="window.location='${STORY}${s.url}'">

  <div class="card-summary" data-id="${s.url}">${sum}</div>
  <div class="card-footer">
    <span class="card-time">${impDot(s.importance)}${ts}</span>
    <div class="card-actions">
      <button class="btn-sm-share" onclick="event.stopPropagation();shareStory('${s.url}',this)">🔗</button>
      <a class="btn-sm-read" href="${STORY}${s.url}" onclick="event.stopPropagation()">Read →</a>
    </div>

</div>`;

/* ── AFFILIATE ── */
async function getAff() {
  if(_aff) return _aff;
  try { const r=await fetch('/affiliate/affiliate.json'); if(r.ok) _aff=await r.json(); } catch(e){}
  return _aff||{};
}
async function getKw() {
  if(_kw) return _kw;
  try { const r=await fetch('/affiliate/keyword-affiliates.json'); if(r.ok) _kw=await r.json(); } catch(e){}
  return _kw||{rules:[]};
}
function wordMatch(hay,kw) {
  const esc=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return new RegExp(`(?<![a-zA-Z])${esc}(?![a-zA-Z])`,'i').test(hay);
}
function topTwoRules(stories,rules) {
  if(!stories?.length||!rules?.length) return {bookRule:null,gearRule:null};
  const sc=rules.map(rule=>({
    rule,
    total:stories.filter(s=>(rule.keywords||[]).some(kw=>wordMatch([s.headline||'',s.summary||''].join(' '),kw))).length
  }));
  const top5=[...sc.filter(s=>s.total>0).sort((a,b)=>b.total-a.total)].slice(0,5).sort(()=>0.5-Math.random());
  return {bookRule:top5[0]?.rule||null, gearRule:top5[1]?.rule||null};
}

function affStripHTML(affData, bookRule, gearRule) {
  const books=affData.books?.items||[], gear=affData.gear?.items||[];
  function pickOne(arr) {
    const must=arr.filter(i=>i.must_show), pool=must.length?must:arr;
    return pool[Math.floor(Math.random()*pool.length)]||null;
  }
  let tiles='';

  // Book tile
  if(bookRule?.books) {
    const b=bookRule.books;
    const tl=(b.title||'').split('\\n').map(l=>`<div>${l}</div>`).join('');
    tiles+=`<div class="aff-tile" style="background:${b.cover_color};display:flex;align-items:center;justify-content:center;padding:4px;cursor:pointer;" title="${b.title}" onclick="window.open('${b.url}','_blank')">
      <div style="font-size:7px;font-weight:800;color:#f9f1e0;text-align:center;line-height:1.2;font-family:Georgia,serif;">${tl}</div>
    </div>`;
  } else {
    const item=pickOne(books);
    if(item) { const lnk=(item.links||[])[0]||'#';
      tiles+=`<div class="aff-tile"><a href="${lnk}" target="_blank" rel="noopener nofollow sponsored"><img src="/affiliate/${item.image}" alt="${item.title}" loading="lazy"></a></div>`; }
  }

  // Gear tile
  if(gearRule?.gear) {
    const g=gearRule.gear;
    const tl=(g.title||'').split('\\n').map(l=>`<div>${l}</div>`).join('');
    tiles+=`<div class="aff-tile" style="background:#2a2a2a;display:flex;align-items:center;justify-content:center;padding:4px;cursor:pointer;" title="${g.title}" onclick="window.open('${g.url}','_blank')">
      <div style="font-size:7px;font-weight:900;color:#f0e4c8;text-align:center;line-height:1.2;font-family:Arial Black,Arial,sans-serif;">${tl}<div style="font-size:12px;">${g.icon||'⚙️'}</div></div>
    </div>`;
  } else {
    const item=pickOne(gear);
    if(item) { const lnk=(item.links||[])[0]||'#';
      tiles+=`<div class="aff-tile"><a href="${lnk}" target="_blank" rel="noopener nofollow sponsored"><img src="/affiliate/${item.image}" alt="${item.title}" loading="lazy"></a></div>`; }
  }

  if(!tiles) return '';
  return `<div class="affiliate-strip">
    <span class="aff-label">🧭 NSM Picks</span>
    <div class="aff-tiles">${tiles}</div>
    <div class="aff-note">Supporting independent journalism</div>
    <div class="aff-disc">Affiliate links.<br>No extra cost.</div>
  </div>`;
}

/* ── ROTATE ── */
function rotateSummaries() {
  document.querySelectorAll('[data-id]').forEach(el=>{
    const s=allStories.find(x=>x.url===el.dataset.id); if(!s) return;
    const opts=[s.social_bluesky,s.social_threads,s.social_facebook].filter(x=>x&&x.trim().length>20);
    if(!opts.length) return;
    el.style.opacity='0';
    setTimeout(()=>{el.textContent=opts[Math.floor(Math.random()*opts.length)];el.style.transition='opacity 0.22s';el.style.opacity='1';},110);
  });
}

/* ── TABS ── */
function buildTabs(stories) {
  const topics=[...new Set(stories.map(s=>s.topic).filter(Boolean))];
  const el=document.getElementById('feed-tabs');
  let html=`<div class="feed-tab active" data-topic="all">For You</div>`;
  TOPICS_ORDER.filter(t=>topics.includes(t)).forEach(t=>{
    html+=`<div class="feed-tab" data-topic="${t}">${TOPIC_LABELS[t]}</div>`;
  });
  el.innerHTML=html;
  el.querySelectorAll('.feed-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      el.querySelectorAll('.feed-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      activeTopic=tab.dataset.topic;
      const f=activeTopic==='all'?allStories:allStories.filter(s=>s.topic===activeTopic);
      renderFeed(f);
    });
  });
}

/* ── RENDER ── */
async function renderFeed(stories) {
  const feed=document.getElementById('nsm-feed');
  if(!stories.length){feed.innerHTML='<div class="feed-loading"><p>No stories in this category yet.</p></div>';return;}

  const affData=await getAff();
  const kwData=await getKw();
  const {bookRule,gearRule}=topTwoRules(stories,kwData.rules||[]);
  const aff=affStripHTML(affData,bookRule,gearRule);

  let html='';
  html+=`<div class="refresh-bar">
    <span class="story-count">${stories.length} stories</span>
    <button class="refresh-btn" onclick="rotateSummaries()"><span class="spin-icon">↻</span> Rotate summaries</button>
  </div>`;

  html+=heroHTML(stories[0]);

  const g1=stories.slice(1,4);
  if(g1.length){html+=`<div class="section-label">Latest</div><div class="cards-grid-3">${g1.map(cardHTML).join('')}</div>`;}
  if(aff) html+=aff;

  const byTopic={};
  stories.slice(4).forEach(s=>{const t=s.topic||'world';if(!byTopic[t])byTopic[t]=[];byTopic[t].push(s);});
  const present=TOPICS_ORDER.filter(t=>byTopic[t]?.length);

  present.forEach((topic,ti)=>{
    const grp=byTopic[topic];
    html+=`<div class="section-label">${TOPIC_LABELS[topic]||topic}</div>`;
    if(grp.length===1) html+=`<div class="cards-grid-2">${cardHTML(grp[0])}</div>`;
    else if(grp.length===2) html+=`<div class="cards-grid-2">${grp.map(cardHTML).join('')}</div>`;
    else {
      html+=`<div class="cards-grid-2">${grp.slice(0,2).map(cardHTML).join('')}</div>`;
      if(grp.length>2) html+=`<div class="cards-grid-3">${grp.slice(2).map(textCardHTML).join('')}</div>`;
    }
    if((ti+1)%3===0&&aff) html+=aff;
  });

  feed.innerHTML=html;
}

/* ── INIT ── */
async function loadStories() {
  try {
    const res=await fetch(SB_URL+'?select=headline,date,url,summary,style,topic,importance,social_bluesky,social_facebook,social_threads&used=eq.true&order=date.desc&limit=50&apikey='+SB_KEY);
    allStories=await res.json();
    if(!Array.isArray(allStories)) throw new Error('bad response');
    buildTabs(allStories);
    await renderFeed(allStories);
  } catch(e) {
    document.getElementById('nsm-feed').innerHTML='<div class="feed-loading"><p>Could not load stories. Please refresh.</p></div>';
    console.error(e);
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  fetch('header.html').then(r=>r.text()).then(html=>{
    document.getElementById('site-header').innerHTML=html;
    const ham=document.getElementById('hamburger'), nav=document.getElementById('mobile-nav');
    if(ham&&nav){
      ham.onclick=()=>{nav.classList.toggle('open');ham.classList.toggle('active');};
      nav.querySelectorAll('a').forEach(a=>{a.onclick=()=>{nav.classList.remove('open');ham.classList.remove('active');};});
    }
  }).finally(()=>loadStories());
});
</script>
