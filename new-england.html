  const md=summary||'';
  const raw=md.replace(/\\n\\n/g,'\n\n').replace(/\\n/g,'\n');
  return stripMd(raw.split('\n\n')[0]);
}
function pillW(t){return'<span class="pill pill-white">'+(TOPIC_LABELS[t]||t||'Local')+'</span>'}
function pillC(t){return'<span class="pill tp-'+(t||'newengland')+'">'+(TOPIC_LABELS[t]||t||'Local')+'</span>'}
function topCls(t){return'tp-bg-'+(t||'newengland')}
function topBG(url,t){
  const kw=KW_IMG[t]||'newengland',res=_imgCache[url];
  const pri=res?'url(\''+res+'\')':'url(\''+IMG_S+url+'.jpg\')';
  return'background-image:'+pri+',url(\''+IMG_K+kw+'.jpg\');background-size:cover;background-position:center;';
}

/* ── SHARE ── */
function shareStory(url,btn){
  const full=window.location.origin+'/'+STORY_PAGE+'?story='+encodeURIComponent(url);
  if(navigator.share){navigator.share({url:full}).catch(()=>{})}
  else{navigator.clipboard.writeText(full).then(()=>{const o=btn.innerHTML;btn.innerHTML='\u2705';setTimeout(()=>btn.innerHTML=o,1800)}).catch(()=>{})}
}

/* ── IMAGE RESOLUTION ── */
async function resolveImg(url,headline){
  if(_imgCache[url]!==undefined)return _imgCache[url];
  for(const ext of['webp','jpg','png']){
    try{const r=await fetch('/images/news/'+url+'.'+ext,{method:'HEAD'});if(r.ok){_imgCache[url]='/images/news/'+url+'.'+ext;return _imgCache[url]}}catch(e){}
  }
  try{
    if(!_imgRules){const r=await fetch('/images/news/image-rules.json');if(r.ok)_imgRules=await r.json()}
    if(_imgRules){
      const h=(headline||'').toLowerCase();
      for(const rule of(_imgRules.keywords||[])){
        if(rule.match.some(kw=>{const esc=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return new RegExp('(?<![a-z])'+esc+'(?![a-z])','i').test(h)})){_imgCache[url]='/images/news/'+rule.image;return _imgCache[url]}
      }
    }
  }catch(e){}
  _imgCache[url]=null;return null;
}
async function preloadImages(stories){await Promise.all(stories.map(s=>resolveImg(s.url,s.headline)))}

/* ── AFFILIATE ── */
async function getAff(){if(_aff)return _aff;try{const r=await fetch('/affiliate/affiliate.json');if(r.ok)_aff=await r.json()}catch(e){}return _aff||{}}
async function getKw(){if(_kw)return _kw;try{const r=await fetch('/affiliate/keyword-affiliates.json');if(r.ok)_kw=await r.json()}catch(e){}return _kw||{rules:[]}}

function findTopTwoRules(stories,rules){
  if(!stories?.length||!rules?.length)return{bookRule:null,gearRule:null};
  const sc=rules.map(rule=>({rule,total:stories.filter(s=>(rule.keywords||[]).some(kw=>wordMatch([s.headline||'',s.summary||''].join(' '),kw))).length}));
  const top5=[...sc.filter(s=>s.total>0).sort((a,b)=>b.total-a.total)].slice(0,5).sort(()=>0.5-Math.random());
  return{bookRule:top5[0]?.rule||null,gearRule:top5[1]?.rule||null};
}

/* Prepend "new england" to Amazon k= param for regional relevance */
function neAffUrl(url){
  if(!url)return url;
  try{
    const u=new URL(url);
    const k=u.searchParams.get('k');
    if(k&&!k.toLowerCase().startsWith('new england')){u.searchParams.set('k','new+england+'+k);return u.toString()}
  }catch(e){}
  return url;
}

function pickAffTileForSection(sectionStories){
  const kwRules=(_allKwData?.rules)||[];
  let best=null,bestScore=0;
  for(const rule of kwRules){
    const score=sectionStories.filter(s=>(rule.keywords||[]).some(kw=>wordMatch([s.headline||'',s.summary||''].join(' '),kw))).length;
    if(score>bestScore){bestScore=score;best=rule;}
  }
  const rule=best||(_affToggle===0?_globalBookRule:_globalGearRule)||_globalBookRule||_globalGearRule;
  if(!rule)return null;
  let tile=null;
  if(_affToggle===0){
    tile=rule.books?bookTileHTML(rule.books):(rule.gear?gearTileHTML(rule.gear):null);
    if(!tile&&_globalBookRule?.books)tile=bookTileHTML(_globalBookRule.books);
  }else{
    tile=rule.gear?gearTileHTML(rule.gear):(rule.books?bookTileHTML(rule.books):null);
    if(!tile&&_globalGearRule?.gear)tile=gearTileHTML(_globalGearRule.gear);
  }
  _affToggle=1-_affToggle;
  return tile;
}

/* Affiliate tile on its own row — no story cards duplicated */
function affTileRowHTML(tile){
  if(!tile)return'';
  return'<div class="aff-tile-row">'
    +'<div></div>'
    +'<div class="aff-tile-center">'+tile+'</div>'
    +'<div></div>'
    +'</div>'
    +'<div class="aff-tile-mobile">'+tile+'</div>';
}

async function loadAffiliateSidebars(stories){

/* ── TABS ── */
function buildTabs(stories){
  /* Only show a topic tab when 2+ stories exist for it */
  const counts={};
  stories.forEach(s=>counts[s._topic]=(counts[s._topic]||0)+1);
  const el=document.getElementById('feed-tabs');
  let html='<div class="feed-tab active" data-topic="all">All Stories</div>';
  TOPICS_ORDER.filter(t=>counts[t]>=2).forEach(t=>{
    html+='<div class="feed-tab" data-topic="'+t+'">'+TOPIC_LABELS[t]+'</div>';
  });
  el.innerHTML=html;
  el.querySelectorAll('.feed-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      el.querySelectorAll('.feed-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      activeTopic=tab.dataset.topic;
      _affToggle=0;
      const f=activeTopic==='all'?allStories:allStories.filter(s=>s._topic===activeTopic);
      renderFeed(f);
    });
  });
}

/* ── RENDER FEED ── */
/* Each story appears exactly once. Category pills shown in mixed "Latest"
   sections, suppressed inside named topic sections. Single-story sections
   borrow a same-topic story from allStories to reach minimum 2. */
function renderFeed(stories){
  const feed=document.getElementById('nsm-feed');
  if(!stories.length){feed.innerHTML='<div style="padding:3rem;text-align:center;color:var(--dimmed);">No stories in this category.</div>';return}

  _affToggle=0;

  let html='<div class="refresh-bar">'
    +'<span class="story-count">Latest Updates \u00b7 '+stories.length+' stories</span>'
    +'<button class="refresh-btn" onclick="shuffleFeed()"><span class="spin-icon">\u21bb</span> Shuffle Feed</button>'
    +'</div>';

  /* ── Slot 0: Hero ── */
  html+=heroHTML(stories[0]);

  /* ── Slots 1–3: "Latest" mixed grid — pills ON ── */
  const g1=stories.slice(1,4);
  if(g1.length){
    html+='<div class="section-label">Latest</div>'
      +'<div class="cards-grid-3">'+g1.map(s=>cardHTML(s,true)).join('')+'</div>';
  }

  /* ── Slots 4–5: Second pair — pills ON (mixed, no section label) ── */
  const g2=stories.slice(4,6);
  if(g2.length){
    html+='<div class="cards-grid-'+(g2.length===1?1:2)+'">'+g2.map(s=>cardHTML(s,true)).join('')+'</div>';
  }

  /* ── Slots 6+: Group by topic ── */
  const usedUrls=new Set(stories.slice(0,6).map(s=>s.url));

  const byTopic={};
  stories.slice(6).forEach(s=>{
    if(usedUrls.has(s.url))return;
    usedUrls.add(s.url);
    const t=s._topic;
    if(!byTopic[t])byTopic[t]=[];
    byTopic[t].push(s);
  });

  /* ── Section balancing: pad single-story sections to 2 ──
     Borrow same-topic stories from full allStories pool (never reuse a URL). */
  let extrasUsed=0;
  const MAX_EXTRAS=4;
  TOPICS_ORDER.forEach(topic=>{
    if(!byTopic[topic]||byTopic[topic].length!==1||extrasUsed>=MAX_EXTRAS)return;
    const donor=allStories.find(s=>s._topic===topic&&!usedUrls.has(s.url));
    if(donor){byTopic[topic].push(donor);usedUrls.add(donor.url);extrasUsed++;}
  });

  const present=TOPICS_ORDER.filter(t=>byTopic[t]&&byTopic[t].length);

  present.forEach((topic,ti)=>{
    const grp=byTopic[topic];

    /* Section label — pills suppressed on cards below */
    html+='<div class="section-label">'+TOPIC_LABELS[topic]+'</div>';

    if(grp.length<=2){
      html+='<div class="cards-grid-2">'+grp.map(s=>cardHTML(s,false)).join('')+'</div>';
    }else{
      html+='<div class="cards-grid-3">'+grp.slice(0,3).map(s=>cardHTML(s,false)).join('')+'</div>';
      const rest=grp.slice(3);
      if(rest.length)html+='<div class="cards-grid-3">'+rest.map(s=>textCardHTML(s,false)).join('')+'</div>';
    }

    /* Affiliate tile every 2nd topic section — tile only, no story re-renders */
    if((ti+1)%2===0){
      const tile=pickAffTileForSection(grp);
      if(tile)html+=affTileRowHTML(tile);
    }
  });

  feed.innerHTML=html;
}

/* Shuffle just re-renders (NE stories have no social fields to rotate) */
function shuffleFeed(){
  const f=activeTopic==='all'?allStories:allStories.filter(s=>s._topic===activeTopic);
  renderFeed(f);
}

/* ── LOAD MORE ── */
let _displayedCount=18;
const PAGE_SIZE=18;

function showLoadMore(total){
  const ex=document.getElementById('load-more-wrap');if(ex)ex.remove();
  if(_displayedCount>=total)return;
  const remaining=Math.min(PAGE_SIZE,total-_displayedCount);
  const wrap=document.createElement('div');
  wrap.id='load-more-wrap';
  wrap.style.cssText='text-align:center;padding:1.5rem 0 .5rem;';
  wrap.innerHTML='<button onclick="loadMore()" style="font-size:13px;font-weight:600;color:var(--blue);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:9px 24px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);">'
    +'Show Me More \u2192 <span style="font-size:11px;font-weight:400;color:var(--dimmed);">'+remaining+' more stories</span>'
    +'</button>';
  document.getElementById('nsm-feed').after(wrap);
}

function loadMore(){
  _displayedCount=Math.min(_displayedCount+PAGE_SIZE,allStories.length);
  const btn=document.querySelector('#load-more-wrap button');
  if(btn){btn.textContent='Loading\u2026';btn.disabled=true;}
  const slice=activeTopic==='all'
    ?allStories.slice(0,_displayedCount)
    :allStories.filter(s=>s._topic===activeTopic).slice(0,_displayedCount);
  renderFeed(slice);
  const total=activeTopic==='all'
    ?allStories.length
    :allStories.filter(s=>s._topic===activeTopic).length;
  showLoadMore(total);
}

/* ── LOAD ── */
async function loadStories(){
  try{
    /* Fetch 60 from Supabase; display first 18 on load, rest available via Load More */
    const res=await fetch(SB_URL+'/news_ne?select=headline,summary,posted_at,url&used=eq.true&order=posted_at.desc&limit=60',{headers:{apikey:SB_KEY}});
    const raw=await res.json();
    allStories=raw.map(s=>({...s,_topic:inferTopic(s)}));
    await preloadImages(allStories.slice(0,_displayedCount));
    await loadAffiliateSidebars(allStories);
    buildTabs(allStories);
    const firstBatch=allStories.slice(0,_displayedCount);
    renderFeed(firstBatch);
    showLoadMore(allStories.length);
  }catch(e){
    document.getElementById('nsm-feed').innerHTML='<div style="padding:3rem;text-align:center;color:var(--dimmed);">Could not load stories. Please refresh.</div>';
    console.error(e);
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  fetch('header.html').then(r=>r.text()).then(html=>{
    document.getElementById('site-header').innerHTML=html;
    const ham=document.getElementById('hamburger'),nav=document.getElementById('mobile-nav');
    if(ham&&nav){
      ham.onclick=()=>{nav.classList.toggle('open');ham.classList.toggle('active')};
      nav.querySelectorAll('a').forEach(a=>{a.onclick=()=>{nav.classList.remove('open');ham.classList.remove('active')}});
    }
    loadStories();
  });
});
