<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0066CC;--blue-lt:#E8F1FA;--red:#CC2200;
  --bg:#EEEEEC;--surface:#FFFFFF;--surface2:#F6F6F4;--border:#E0E0DC;
  --text:#111111;--muted:#555555;--dimmed:#999999;
  --font-h:'DM Serif Display',Georgia,serif;--font-b:'DM Sans',Arial,sans-serif;
  --r:11px;--shadow:0 1px 8px rgba(0,0,0,.08);--shadow-h:0 5px 20px rgba(0,0,0,.13)
}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);padding-top:70px}
.page-wrap{max-width:1160px;margin:0 auto;padding:1.1rem 1.1rem 2rem}

/* ── QUEUE HEADER ── */
.queue-header{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:.9rem 1.25rem;margin-bottom:1rem;
  display:flex;align-items:center;gap:.75rem;border-left:3px solid var(--blue)
}
.queue-title{font-family:var(--font-h);font-size:1.4rem;color:var(--text);line-height:1.2}
.queue-subtitle{font-size:.78rem;color:var(--dimmed);margin-left:auto;white-space:nowrap}

/* ── DATE GROUP ── */
.date-group{margin-bottom:1.5rem}
.date-header{
  display:flex;align-items:center;gap:10px;font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--dimmed);margin:1.3rem 0 .75rem
}
.date-header::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── QUEUE CARD ── */
.queue-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;box-shadow:var(--shadow);margin-bottom:.75rem;
  transition:box-shadow .18s
}
.queue-card:hover{box-shadow:var(--shadow-h)}

/* Color top — same pattern as story cards */
.qcard-top{
  position:relative;min-height:100px;display:flex;flex-direction:column;
  justify-content:flex-end;padding:.75rem 1rem .8rem;overflow:hidden;flex-shrink:0;
  cursor:pointer
}
.qcard-top-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .3s}
.queue-card:hover .qcard-top-bg{transform:scale(1.03)}
.qcard-top-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.82) 0%,rgba(0,0,0,.3) 55%,rgba(0,0,0,.02) 100%)}
.qcard-top-content{position:relative;z-index:1}
.qcard-slot{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;color:rgba(255,255,255,.9);
  background:rgba(0,0,0,.35);padding:3px 8px;border-radius:20px;
  margin-bottom:.45rem;backdrop-filter:blur(4px)
}
.qcard-slot-dot{width:6px;height:6px;border-radius:50%;background:#4fc3f7;flex-shrink:0}
.qcard-slot-dot.next{background:#ff9800;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.qcard-hl{font-family:var(--font-h);font-size:1.05rem;line-height:1.2;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);display:block}

/* Topic gradient classes — same as index2 */
.tp-bg-politics{background:linear-gradient(160deg,#0D3270,#1E5BB8)}
.tp-bg-economy{background:linear-gradient(160deg,#0A3D1F,#1A7A3C)}
.tp-bg-health{background:linear-gradient(160deg,#6B2E00,#C05A0A)}
.tp-bg-legal{background:linear-gradient(160deg,#320A6B,#6A28C0)}
.tp-bg-war{background:linear-gradient(160deg,#6B0A0A,#B52020)}
.tp-bg-crime{background:linear-gradient(160deg,#4A0A0A,#952020)}
.tp-bg-science{background:linear-gradient(160deg,#063A52,#0F7EA0)}
.tp-bg-technology{background:linear-gradient(160deg,#0A2252,#1845A0)}
.tp-bg-ai{background:linear-gradient(160deg,#280A52,#5520A0)}
.tp-bg-world{background:linear-gradient(160deg,#282828,#555555)}
.tp-bg-environment{background:linear-gradient(160deg,#083A08,#1A7A1A)}
.tp-bg-military{background:linear-gradient(160deg,#3A1A04,#6A3810)}

/* Colored topic pills */
.pill{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.tp-politics{background:#DDEEFF;color:#0044AA}.tp-economy{background:#DDFAE8;color:#006622}
.tp-health{background:#FFEEDD;color:#883300}.tp-legal{background:#EEE0FF;color:#5500AA}
.tp-war{background:#FFDDDD;color:#AA1100}.tp-crime{background:#FFDDDD;color:#AA1100}
.tp-science{background:#DDEEFC;color:#005577}.tp-technology{background:#DDEEFF;color:#003399}
.tp-ai{background:#EEE0FF;color:#440099}.tp-world{background:#EEEEEE;color:#555555}
.tp-environment{background:#DDFAE8;color:#004400}.tp-military{background:#FFEEDD;color:#663300}

/* Card body */
.qcard-body{padding:.8rem 1rem .75rem;display:flex;flex-direction:column;gap:.6rem}
.qcard-summary{font-size:.85rem;line-height:1.65;color:var(--muted)}
.qcard-summary-rest{font-size:.85rem;line-height:1.65;color:var(--muted);margin-top:.4rem;display:none}
.qcard-summary-rest.open{display:block}

/* Affiliate debug badges */
.aff-badges{display:flex;gap:6px;flex-wrap:wrap}
.aff-badge{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.03em}
.aff-badge-book{background:#E8F0FF;color:#0044AA;border:1px solid #B0C8FF}
.aff-badge-gear{background:#FFF4E0;color:#8A5000;border:1px solid #FFD080}
.aff-badge-none{background:#F0F0F0;color:#888;border:1px solid #DDD}

/* Card footer */
.qcard-footer{
  display:flex;align-items:center;gap:8px;padding-top:.6rem;
  border-top:1px solid var(--border);flex-wrap:wrap
}
.qcard-btn{
  font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface2);color:var(--muted);
  display:inline-flex;align-items:center;gap:4px;transition:all .15s;text-decoration:none
}
.qcard-btn:hover{border-color:#bbb;color:var(--text)}
.qcard-btn-review{color:#0066CC;background:var(--blue-lt);border-color:rgba(0,102,204,.2)}
.qcard-btn-review:hover{background:#D0E6F8}
.qcard-btn-share{color:var(--muted)}
.qcard-share-fb{font-size:.72rem;color:green;font-weight:600;margin-left:2px}

/* Review panel */
.review-panel{
  background:var(--surface2);border-top:1px solid var(--border);
  padding:1rem;display:none
}
.review-panel.open{display:block}
.review-panel h4{font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:.6rem}
.review-panel input,.review-panel textarea{
  width:100%;padding:8px 10px;margin:4px 0;border:1px solid var(--border);
  border-radius:var(--r);font-size:.85rem;font-family:var(--font-b);
  background:var(--surface);color:var(--text);transition:border-color .15s
}
.review-panel input:focus,.review-panel textarea:focus{outline:none;border-color:var(--blue)}
.review-panel textarea{resize:vertical;min-height:90px}
.review-panel .rp-submit{
  margin-top:.5rem;font-size:.82rem;font-weight:600;color:#fff;
  background:var(--blue);border:none;border-radius:20px;padding:7px 16px;cursor:pointer
}
.review-panel .rp-submit:hover{background:#0055BB}
.review-panel .rp-status{font-size:.78rem;margin-top:.4rem;color:green}

/* Global feedback card */
.feedback-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:1.25rem;margin-top:1.5rem
}
.feedback-card h2{
  font-family:var(--font-h);font-size:1.1rem;color:var(--text);
  margin-bottom:.9rem;padding-bottom:.6rem;border-bottom:2px solid var(--blue)
}
.feedback-card input,.feedback-card textarea{
  width:100%;padding:8px 10px;margin:4px 0;border:1px solid var(--border);
  border-radius:var(--r);font-size:.88rem;font-family:var(--font-b);
  background:var(--surface2);color:var(--text)
}
.feedback-card input:focus,.feedback-card textarea:focus{outline:none;border-color:var(--blue)}
.feedback-card textarea{resize:vertical;min-height:100px}
.feedback-card .gf-submit{
  margin-top:.6rem;font-size:.88rem;font-weight:600;color:#fff;
  background:var(--blue);border:none;border-radius:20px;padding:8px 20px;cursor:pointer
}
.feedback-card .gf-submit:hover{background:#0055BB}
.gf-status{font-size:.8rem;margin-top:.4rem}

/* Loading */
.feed-loading{text-align:center;padding:4rem;color:var(--dimmed)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

footer{text-align:center;padding:1.5rem 1rem;font-size:.8rem;color:#999;border-top:1px solid var(--border);margin-top:1rem}

/* Mobile */
@media(max-width:860px){
  body{background:#EBEBEB}
  .page-wrap{padding:.75rem .75rem 1.5rem}
  .queue-subtitle{display:none}
  .qcard-hl{font-size:.95rem}
}
</style>

<script>
const SB_KEY='sb_publishable_5uAn1PjQGf2Vmr7qpwGcdg_LOtygPRB';
const IMG_K='https://nospin.media/images/keyword/';

const TOPIC_LABELS={politics:'Politics',economy:'Economy',legal:'Legal',health:'Health',science:'Science',ai:'AI',technology:'Technology',war:'War',military:'Military',crime:'Crime',environment:'Environment',world:'World'};
const KW_IMG={politics:'politics',economy:'economy',health:'health',legal:'court',war:'war',crime:'crime',science:'science',technology:'technology',ai:'ai',world:'world',environment:'environment',military:'military'};

let _aff=null,_kw=null,_imgRules=null,_imgCache={};

/* ── SLOT SCHEDULE ── */
const SLOTS=['00:30','06:15','08:45','10:15','11:45','13:15','15:45','17:15','18:30','20:45'];

function assignSlots(stories){
  let slotPointer=0,startDateEST;
  (function initSlot(){
    const nowEST=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
    const todayStr=nowEST.toLocaleDateString('en-CA',{timeZone:'America/New_York'});
    const jan=new Date(nowEST.getFullYear(),0,1),jul=new Date(nowEST.getFullYear(),6,1);
    const stdOff=Math.max(jan.getTimezoneOffset(),jul.getTimezoneOffset());
    const isDST=nowEST.getTimezoneOffset()<stdOff;
    const tzOff=isDST?'-04:00':'-05:00';
    let found=false;
    for(let i=0;i<SLOTS.length;i++){
      const slotDT=new Date(todayStr+'T'+SLOTS[i]+':00'+tzOff);
      if(slotDT>nowEST){slotPointer=i;startDateEST=slotDT;found=true;break}
    }
    if(!found){
      slotPointer=0;
      const tom=new Date(nowEST);tom.setDate(tom.getDate()+1);
      const tStr=tom.toLocaleDateString('en-CA',{timeZone:'America/New_York'});
      const jan2=new Date(tom.getFullYear(),0,1),jul2=new Date(tom.getFullYear(),6,1);
      const std2=Math.max(jan2.getTimezoneOffset(),jul2.getTimezoneOffset());
      const dst2=tom.getTimezoneOffset()<std2;
      startDateEST=new Date(tStr+'T'+SLOTS[0]+':00'+(dst2?'-04:00':'-05:00'));
    }
  })();

  let currentDay=startDateEST;
  const nowC=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  const janC=new Date(nowC.getFullYear(),0,1),julC=new Date(nowC.getFullYear(),6,1);
  const stdC=Math.max(janC.getTimezoneOffset(),julC.getTimezoneOffset());
  const dstC=nowC.getTimezoneOffset()<stdC;
  const tzOff=dstC?'-04:00':'-05:00';

  for(let i=0;i<stories.length;i++){
    const dateStr=currentDay.toLocaleDateString('en-CA',{timeZone:'America/New_York'});
    const scheduled=new Date(dateStr+'T'+SLOTS[slotPointer]+':00'+tzOff);
    stories[i].scheduled=scheduled.toISOString();
    slotPointer++;
    if(slotPointer>=SLOTS.length){
      slotPointer=0;
      const nxt=new Date(currentDay);nxt.setDate(nxt.getDate()+1);
      const nStr=nxt.toLocaleDateString('en-CA',{timeZone:'America/New_York'});
      currentDay=new Date(nStr+'T'+SLOTS[0]+':00'+tzOff);
    }
  }
  return stories;
}

/* ── IMAGE RESOLUTION ── */
async function resolveImg(url,headline,summary){
  if(_imgCache[url]!==undefined)return _imgCache[url];
  for(const ext of['webp','jpg','png']){
    try{const r=await fetch('/images/news/'+url+'.'+ext,{method:'HEAD'});if(r.ok){_imgCache[url]='/images/news/'+url+'.'+ext;return _imgCache[url]}}catch(e){}
  }
  try{
    if(!_imgRules){const r=await fetch('/images/news/image-rules.json');if(r.ok)_imgRules=await r.json()}
    if(_imgRules){
      const h=((headline||'')+' '+(summary||'')).toLowerCase();
      for(const rule of(_imgRules.keywords||[])){
        if(rule.match.some(kw=>{const esc=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return new RegExp('(?<![a-z])'+esc+'(?![a-z])','i').test(h)})){_imgCache[url]='/images/news/'+rule.image;return _imgCache[url]}
      }
    }
  }catch(e){}
  _imgCache[url]=null;return null;
}

/* ── WORD MATCH ── */
function wordMatch(hay,kw){const esc=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return new RegExp('(?<![a-zA-Z])'+esc+'(?![a-zA-Z])','i').test(hay)}

/* ── KEYWORD AFFILIATE ── */
async function getKw(){if(_kw)return _kw;try{const r=await fetch('/affiliate/keyword-affiliates.json');if(r.ok)_kw=await r.json()}catch(e){}return _kw||{rules:[]}}
function findTopTwoRules(stories,rules){
  if(!stories?.length||!rules?.length)return{bookRule:null,gearRule:null};
  const sc=rules.map(rule=>({rule,total:stories.filter(s=>(rule.keywords||[]).some(kw=>wordMatch([s.headline||'',s.summary||''].join(' '),kw))).length}));
  const ranked=sc.filter(s=>s.total>0).sort((a,b)=>b.total-a.total);
  return{bookRule:ranked[0]?.rule||null,gearRule:ranked[1]?.rule||null};
}
function storyAffRule(story,rules){
  const text=[story.headline||'',story.summary||''].join(' ');
  const sc=rules.map(rule=>({rule,score:(rule.keywords||[]).filter(kw=>wordMatch(text,kw)).length})).filter(s=>s.score>0).sort((a,b)=>b.score-a.score);
  return sc[0]?.rule||null;
}

/* ── TOPIC BG ── */
function topCls(t){return'tp-bg-'+(t||'world')}
function topBG(url,t,imgUrl){
  const kw=KW_IMG[t]||'world';
  const pri=imgUrl?'url(\''+imgUrl+'\')':'url(\'https://nospin.media/images/story/'+url+'.jpg\')';
  return'background-image:'+pri+',url(\''+IMG_K+kw+'.jpg\');background-size:cover;background-position:center;';
}

/* ── PARSE HEADLINE ── */
function parseHL(raw){
  const h=(raw||'').trim(),nl=h.indexOf('\n');
  if(nl>-1)return{line1:h.substring(0,nl).trim(),line2:h.substring(nl+1).trim()};
  return{line1:h,line2:''};
}

/* ── MARKDOWN ── */
function convertMd(text){
  if(!text)return'';
  text=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/(?<!\*)\*(?!\s)([^*]+?)\*(?!\*)/g,'<em>$1</em>');
  text=text.replace(/\\n/g,'\n');text=text.replace(/\n{3,}/g,'\n\n');
  return text.trim();
}

/* ── SHARE: copies headline + link ── */
async function shareQueued(url,headline,btn){
  const shareUrl=window.location.origin+window.location.pathname+'?id='+encodeURIComponent(url);
  const hl=(headline||'').replace(/\n/g,' — ').trim();
  const text=hl+'\n'+shareUrl;
  const fb=btn.querySelector('.qcard-share-fb');
  try{
    await navigator.clipboard.writeText(text);
    if(fb){const o=fb.textContent;fb.textContent='Copied!';setTimeout(()=>fb.textContent=o,2000)}
  }catch(e){
    if(fb){fb.textContent='Failed';setTimeout(()=>fb.textContent='',2000)}
  }
}

/* ── TOGGLE REVIEW PANEL ── */
function toggleReview(url){
  const panel=document.getElementById('rp-'+url);
  if(!panel)return;
  panel.classList.toggle('open');
  if(panel.classList.contains('open')){
    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

/* ── TOGGLE SUMMARY ── */
function toggleSummary(btn){
  const rest=btn.closest('.qcard-body').querySelector('.qcard-summary-rest');
  if(!rest)return;
  const open=rest.classList.contains('open');
  rest.classList.toggle('open',!open);
  btn.textContent=open?'Show more ↓':'Show less ↑';
}

/* ── SUBMIT REVIEW ── */
async function submitReview(url,btn){
  const panel=document.getElementById('rp-'+url);
  if(!panel)return;
  const name=panel.querySelector('.rp-name').value.trim();
  const email=panel.querySelector('.rp-email').value.trim();
  const msg=panel.querySelector('.rp-msg').value.trim();
  const status=panel.querySelector('.rp-status');
  if(!email||!msg){status.style.color='red';status.textContent='Email and message required.';return}
  status.style.color='#666';status.textContent='Sending…';
  try{
    const res=await fetch('https://script.google.com/macros/s/AKfycbwr26uY61Dip94_QwzyLh1JDSIFdYHJgqL_scKGLdRd9O42VLDBvt2XzkA67tjphJrs/exec',{
      method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({name,email,message:msg,subject:'NSM Queue Review'})
    });
    if(res.ok){status.style.color='green';status.textContent='✅ Sent!';panel.querySelector('.rp-msg').value=''}
    else{status.style.color='red';status.textContent='❌ Error sending.'}
  }catch(e){status.style.color='red';status.textContent='❌ Could not connect.'}
}

/* ── MAIN LOAD ── */
async function loadQueue(){
  const storyId=new URLSearchParams(window.location.search).get('id');
  const container=document.getElementById('queue-container');
  container.innerHTML='<div class="feed-loading"><div class="spinner"></div>Loading queue…</div>';

  let stories;
  try{
    const res=await fetch('https://data.nospin.media/unpublished');
    stories=await res.json();
  }catch(e){
    container.innerHTML='<div class="feed-loading"><p>Could not load queue. Please refresh.</p></div>';return;
  }

  if(storyId){
    stories=stories.filter(r=>String(r.url).trim()===String(storyId).trim());
    if(stories.length===0){
      try{
        const chk=await fetch('https://dckmflnbprhmaqysuued.supabase.co/rest/v1/news_posts?select=url&url=eq.'+storyId+'&used=eq.true',{headers:{apikey:SB_KEY}});
        const chkData=await chk.json();
        if(chkData.length>0){window.location.replace('/story.html?story='+storyId);return}
      }catch(e){}
      container.innerHTML='<div class="feed-loading"><p>Story not found in queue. It may have been published or removed.</p><p style="margin-top:.5rem"><a href="/news.html" style="color:var(--blue);font-weight:600;">🔎 Search the archive</a></p></div>';
      return;
    }
  }

  stories.sort((a,b)=>parseInt(a.order)-parseInt(b.order));
  stories=stories.filter(s=>s.headline);
  stories=assignSlots(stories);

  const kwData=await getKw();
  const {bookRule,gearRule}=findTopTwoRules(stories,kwData.rules||[]);

  // Resolve all images in parallel
  const imgUrls=await Promise.all(stories.map(s=>resolveImg(s.url,s.headline,s.summary)));

  // Group by date
  const groups={};
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const weekdays=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  stories.forEach((s,i)=>{
    const date=new Date(s.scheduled).toLocaleDateString('en-CA',{timeZone:'America/New_York'});
    if(!groups[date])groups[date]=[];
    groups[date].push({story:s,img:imgUrls[i]});
  });

  container.innerHTML='';

  // Update subtitle with count
  document.getElementById('queue-count').textContent=stories.length+' stor'+(stories.length===1?'y':'ies') +' queued';

  const nowEST=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  let firstSlotMarked=false;

  for(const date in groups){
    const [y,m,d]=date.split('-');
    const dt=new Date(Number(y),Number(m)-1,Number(d),12,0,0);
    const label=weekdays[dt.getDay()]+', '+months[dt.getMonth()]+' '+dt.getDate()+', '+dt.getFullYear();

    const groupEl=document.createElement('div');
    groupEl.className='date-group';
    groupEl.innerHTML='<div class="date-header">'+label+'</div>';

    for(const {story,img} of groups[date]){
      const p=parseHL(story.headline);
      const topic=story.topic||'world';
      const sched=new Date(story.scheduled);
      const isNext=!firstSlotMarked&&sched>nowEST;
      if(isNext)firstSlotMarked=true;

      const timeLabel=sched.toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit'});
      const topicLabel=TOPIC_LABELS[topic]||topic||'News';

      // Affiliate debug badge for this story
      const storyRule=storyAffRule(story,kwData.rules||[]);
      let badgeHTML='';
      if(storyRule){
        const bl=storyRule.books?.category_label||'Book match';
        const gl=storyRule.gear?.category_label||'';
        badgeHTML='<div class="aff-badges">'
          +(storyRule.books?'<span class="aff-badge aff-badge-book">📚 '+bl+'</span>':'')
          +(storyRule.gear?'<span class="aff-badge aff-badge-gear">🔧 '+gl+'</span>':'')
          +'</div>';
      } else {
        badgeHTML='<div class="aff-badges"><span class="aff-badge aff-badge-none">📭 No affiliate match</span></div>';
      }

      // Summary split
      const fullMd=convertMd(story.summary||'');
      const paras=fullMd.split(/\n\n+/);
      const first=paras[0]||'';
      const rest=paras.slice(1).join('\n\n');
      const hasMore=rest.trim().length>0;

      const safeUrl=String(story.url||'').replace(/'/g,"\\'");
      const safeHL=(story.headline||'').replace(/'/g,"\\'").replace(/\n/g,' ').replace(/\r/g,'');

      const card=document.createElement('div');
      card.className='queue-card';
      if(storyId&&String(story.url).trim()===String(storyId).trim()){
        card.style.outline='2px solid var(--blue)';
      }

      card.innerHTML=
        '<div class="qcard-top '+topCls(topic)+'" onclick="toggleSummary(this.closest(\'.queue-card\').querySelector(\'.qcard-btn-expand\'))">'
        +'<div class="qcard-top-bg" style="'+topBG(story.url,topic,img)+'"></div>'
        +'<div class="qcard-top-scrim"></div>'
        +'<div class="qcard-top-content">'
        +'<div class="qcard-slot">'
        +'<div class="qcard-slot-dot'+(isNext?' next':'')+'"></div>'
        +(isNext?'<strong>NEXT UP</strong> · ':'')
        +timeLabel+' EST'
        +'</div>'
        +'<span class="qcard-hl">'+p.line1+(p.line2?' <span style="opacity:.7;font-family:var(--font-b);font-size:.82rem;font-weight:400;">'+p.line2+'</span>':'')+'</span>'
        +'</div></div>'
        +'<div class="qcard-body">'
        +(badgeHTML)
        +'<div class="qcard-summary">'+first+'</div>'
        +(hasMore?'<div class="qcard-summary-rest"'+(storyId?'style="display:block"':'')+'>'+rest+'</div>':'')
        +'<div class="qcard-footer">'
        +(hasMore?'<button class="qcard-btn qcard-btn-expand" onclick="toggleSummary(this)">'+(storyId?'Show less ↑':'Show more ↓')+'</button>':'')
        +'<button class="qcard-btn qcard-btn-review" onclick="toggleReview(\''+safeUrl+'\')">✏️ Review</button>'
        +'<button class="qcard-btn qcard-btn-share" onclick="shareQueued(\''+safeUrl+'\',\''+safeHL+'\',this)">'
        +'🔗 Share <span class="qcard-share-fb"></span>'
        +'</button>'
        +'<span class="pill tp-'+(topic||'world')" style="margin-left:auto;">'+topicLabel+'</span>'
        +'</div>'
        +'</div>'
        +'<div class="review-panel" id="rp-'+story.url+'">'
        +'<h4>✏️ Notes on: '+p.line1+'</h4>'
        +'<input type="text" class="rp-name" placeholder="Your first name">'
        +'<input type="email" class="rp-email" placeholder="you@email.com">'
        +'<textarea class="rp-msg" rows="4" placeholder="Feedback or notes on this story…"></textarea>'
        +'<div class="rp-status"></div>'
        +'<button class="rp-submit" onclick="submitReview(\''+safeUrl+'\',this)">💬 Send Review</button>'
        +'</div>';

      groupEl.appendChild(card);
    }

    container.appendChild(groupEl);
  }
}

/* ── GLOBAL FEEDBACK ── */
async function submitGlobalFeedback(e){
  e.preventDefault();
  const name=document.getElementById('gf-name').value.trim();
  const email=document.getElementById('gf-email').value.trim();
  const msg=document.getElementById('gf-message').value.trim();
  const status=document.getElementById('gf-status');
  if(!email||!msg){status.style.color='red';status.textContent='Email and message required.';return}
  status.style.color='#666';status.textContent='Sending…';
  try{
    const res=await fetch('https://script.google.com/macros/s/AKfycbwr26uY61Dip94_QwzyLh1JDSIFdYHJgqL_scKGLdRd9O42VLDBvt2XzkA67tjphJrs/exec',{
      method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({name,email,message:msg,subject:'NSM Queue Feedback'})
    });
    if(res.ok){status.style.color='green';status.textContent='✅ Sent!';document.getElementById('gf-form').reset()}
    else{status.style.color='red';status.textContent='❌ Error.'}
  }catch(e){status.style.color='red';status.textContent='❌ Could not connect.'}
}

document.addEventListener('DOMContentLoaded',()=>{
  fetch('header.html').then(r=>r.text()).then(html=>{
    document.getElementById('site-header').innerHTML=html;
    const ham=document.getElementById('hamburger'),nav=document.getElementById('mobile-nav');
    if(ham&&nav){
      ham.onclick=()=>{nav.classList.toggle('open');ham.classList.toggle('active')};
      nav.querySelectorAll('a').forEach(a=>{a.onclick=()=>{nav.classList.remove('open');ham.classList.remove('active')}});
    }
    loadQueue();
  });
  document.getElementById('gf-form').addEventListener('submit',submitGlobalFeedback);
});
</script>
