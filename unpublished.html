<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0066CC;--blue-lt:#E8F1FA;--red:#CC2200;
  --bg:#EEEEEC;--surface:#FFFFFF;--surface2:#F6F6F4;--border:#E0E0DC;
  --text:#111111;--muted:#555555;--dimmed:#999999;
  --font-h:'DM Serif Display',Georgia,serif;--font-b:'DM Sans',Arial,sans-serif;
  --r:11px;--shadow:0 1px 8px rgba(0,0,0,.08);--shadow-h:0 5px 20px rgba(0,0,0,.13)
}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);padding-top:70px}
.page-wrap{max-width:1160px;margin:0 auto;padding:1.1rem 1.1rem 2rem}
.queue-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:.9rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;border-left:3px solid var(--blue)}
.queue-title{font-family:var(--font-h);font-size:1.4rem;color:var(--text)}
.queue-count{font-size:.78rem;color:var(--dimmed);margin-left:auto}
.date-group{margin-bottom:1.5rem}
.date-header{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dimmed);margin:1.3rem 0 .75rem}
.date-header::after{content:'';flex:1;height:1px;background:var(--border)}
.story-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:.75rem;transition:box-shadow .18s}
.story-card:hover{box-shadow:var(--shadow-h)}
.card-color-top{position:relative;min-height:95px;display:flex;flex-direction:column;justify-content:flex-end;padding:.7rem 1rem .75rem;overflow:hidden}
.card-top-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .3s}
.story-card:hover .card-top-bg{transform:scale(1.03)}
.card-top-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.82) 0%,rgba(0,0,0,.3) 55%,rgba(0,0,0,.02) 100%)}
.card-top-content{position:relative;z-index:1}
.slot-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:rgba(255,255,255,.9);background:rgba(0,0,0,.3);padding:2px 8px;border-radius:20px;margin-bottom:.4rem}
.slot-dot{width:6px;height:6px;border-radius:50%;background:#4fc3f7;flex-shrink:0}
.slot-dot.next{background:#ff9800;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card-headline{font-family:var(--font-h);font-size:1.05rem;line-height:1.2;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);display:block}
.card-hl2{font-family:var(--font-b);font-size:.75rem;font-weight:400;color:rgba(255,255,255,.78);display:block;margin-top:2px}
.tp-bg-politics{background:linear-gradient(160deg,#0D3270,#1E5BB8)}
.tp-bg-economy{background:linear-gradient(160deg,#0A3D1F,#1A7A3C)}
.tp-bg-health{background:linear-gradient(160deg,#6B2E00,#C05A0A)}
.tp-bg-legal{background:linear-gradient(160deg,#320A6B,#6A28C0)}
.tp-bg-war{background:linear-gradient(160deg,#6B0A0A,#B52020)}
.tp-bg-crime{background:linear-gradient(160deg,#4A0A0A,#952020)}
.tp-bg-science{background:linear-gradient(160deg,#063A52,#0F7EA0)}
.tp-bg-technology{background:linear-gradient(160deg,#0A2252,#1845A0)}
.tp-bg-ai{background:linear-gradient(160deg,#280A52,#5520A0)}
.tp-bg-world{background:linear-gradient(160deg,#282828,#555555)}
.tp-bg-environment{background:linear-gradient(160deg,#083A08,#1A7A1A)}
.tp-bg-military{background:linear-gradient(160deg,#3A1A04,#6A3810)}
.card-body{padding:.8rem 1rem .75rem}
.affiliate-badge{display:inline-block;margin:0 4px 4px 0;padding:3px 8px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.03em}
.affiliate-badge.book{background:#E8F0FF;color:#0044AA;border:1px solid #B0C8FF}
.affiliate-badge.gear{background:#FFF4E0;color:#8A5000;border:1px solid #FFD080}
.affiliate-badge.none{background:#F0F0F0;color:#888;border:1px solid #DDD}
.story-summary-preview{font-size:.85rem;line-height:1.65;color:var(--muted)}
.story-summary-rest{font-size:.85rem;line-height:1.65;color:var(--muted);margin-top:.4rem;white-space:pre-line}
.card-footer{display:flex;align-items:center;gap:8px;padding-top:.6rem;border-top:1px solid var(--border);flex-wrap:wrap;margin-top:.6rem}
.story-link,.btn-review{font-size:.8rem;font-weight:600;color:var(--blue);background:none;border:none;padding:0;cursor:pointer;font-family:var(--font-b)}
.story-link:hover,.btn-review:hover{text-decoration:underline}
.share-confirm{font-size:.72rem;color:green;font-weight:600;margin-left:2px}
.feedback-panel{background:var(--surface2);border-top:1px solid var(--border);padding:1rem;display:none}
.feedback-panel.open{display:block}
.feedback-panel h4{font-size:.82rem;font-weight:700;margin-bottom:.6rem}
.feedback-panel input,.feedback-panel textarea{width:100%;padding:8px 10px;margin:4px 0;border:1px solid var(--border);border-radius:var(--r);font-size:.85rem;font-family:var(--font-b);background:var(--surface)}
.feedback-panel textarea{resize:vertical;min-height:80px}
.feedback-panel .rp-submit{margin-top:.5rem;font-size:.82rem;font-weight:600;color:#fff;background:var(--blue);border:none;border-radius:20px;padding:7px 16px;cursor:pointer}
.feedback-panel .form-status{font-size:.78rem;margin-top:.4rem}
.global-feedback{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:1.25rem;margin-top:1.5rem}
.global-feedback h2{font-family:var(--font-h);font-size:1.1rem;margin-bottom:.9rem;padding-bottom:.6rem;border-bottom:2px solid var(--blue)}
.global-feedback input,.global-feedback textarea{width:100%;padding:8px 10px;margin:4px 0;border:1px solid var(--border);border-radius:var(--r);font-size:.88rem;font-family:var(--font-b);background:var(--surface2)}
.global-feedback textarea{resize:vertical;min-height:100px}
.global-feedback button[type="submit"]{margin-top:.6rem;font-size:.88rem;font-weight:600;color:#fff;background:var(--blue);border:none;border-radius:20px;padding:8px 20px;cursor:pointer}
.global-feedback .form-status{font-size:.8rem;margin-top:.4rem}
.feed-loading{text-align:center;padding:4rem;color:var(--dimmed)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:1.5rem 1rem;font-size:.8rem;color:#999;border-top:1px solid var(--border);margin-top:1rem}
@media(max-width:860px){body{background:#EBEBEB}.page-wrap{padding:.75rem .75rem 1.5rem}.queue-count{display:none}}

<script>
const SB_KEY='sb_publishable_5uAn1PjQGf2Vmr7qpwGcdg_LOtygPRB';
const IMG_K='https://nospin.media/images/keyword/';
const KW_IMG={politics:'politics',economy:'economy',health:'health',legal:'court',war:'war',crime:'crime',science:'science',technology:'technology',ai:'ai',world:'world',environment:'environment',military:'military'};

let _affiliateData=null,_keywordAffiliateData=null,_imageRulesCache=null;

async function loadAffiliateData(){
  if(_affiliateData)return _affiliateData;
  try{const r=await fetch('/affiliate/affiliate.json');if(r.ok)_affiliateData=await r.json()}catch(e){}
  return _affiliateData||{};
}
async function loadKeywordAffiliateData(){
  if(_keywordAffiliateData)return _keywordAffiliateData;
  try{const r=await fetch('/affiliate/keyword-affiliates.json');if(r.ok)_keywordAffiliateData=await r.json()}catch(e){}
  return _keywordAffiliateData||{rules:[]};
}
function wordMatch(hay,kw){
  const esc=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return new RegExp('(?<![a-zA-Z])'+esc+'(?![a-zA-Z])','i').test(hay);
}
function findTopTwoRules(stories,rules){
  if(!stories?.length||!rules?.length)return{bookRule:null,gearRule:null};
  const sc=rules.map(rule=>({rule,total:stories.filter(s=>(rule.keywords||[]).some(kw=>wordMatch([s.headline||'',s.summary||''].join(' '),kw))).length}));
  const ranked=sc.filter(s=>s.total>0).sort((a,b)=>b.total-a.total);
  return{bookRule:ranked[0]?.rule||null,gearRule:ranked[1]?.rule||null};
}
function getRandomLink(item){return(item.links||[])[Math.floor(Math.random()*(item.links||[]).length)]||'#'}
function pickItems(items,count){
  const must=items.filter(i=>i.must_show),opt=[...items.filter(i=>!i.must_show)].sort(()=>0.5-Math.random());
  const pool=[...must,...opt],seen=new Set(),result=[];
  for(const item of pool){if(!seen.has(item.title)&&result.length<count){seen.add(item.title);result.push(item)}}
  return result;
}
function pickOneMobile(items){const must=items.filter(i=>i.must_show);const pool=must.length?must:items;return pool[Math.floor(Math.random()*pool.length)]}
function renderTileHTML(item){return'<a href="'+getRandomLink(item)+'" target="_blank" rel="noopener nofollow sponsored"><img src="/affiliate/'+item.image+'" alt="'+item.title+'" loading="lazy"></a>'}
async function loadAllAffiliateTiles(bookRule,gearRule){
  const data=await loadAffiliateData();
  const bookItems=data.books?.items||[],gearItems=data.gear?.items||[];
  const bEl=document.getElementById('book-tiles');
  if(bEl){let h='';pickItems(bookItems,3).forEach(i=>{h+='<div style="margin-bottom:12px;">'+renderTileHTML(i)+'</div>'});bEl.innerHTML=h}
  const gEl=document.getElementById('gear-tiles');
  if(gEl){let h='';pickItems(gearItems,3).forEach(i=>{h+='<div style="margin-bottom:12px;">'+renderTileHTML(i)+'</div>'});gEl.innerHTML=h}
  // Mobile
  const mb=bookItems.length?pickOneMobile(bookItems):null;
  const mg=gearItems.length?pickOneMobile(gearItems):null;
  const bHTML=mb?'<a href="'+getRandomLink(mb)+'" target="_blank" rel="noopener nofollow sponsored"><img src="/affiliate/'+mb.image+'" alt="'+mb.title+'" loading="lazy" style="width:100%;display:block;border-radius:8px;"></a>':'';
  const gHTML=mg?'<a href="'+getRandomLink(mg)+'" target="_blank" rel="noopener nofollow sponsored"><img src="/affiliate/'+mg.image+'" alt="'+mg.title+'" loading="lazy" style="width:100%;display:block;border-radius:8px;"></a>':'';
  window.mobileAffiliateHTML='<div class="mobile-affiliate-insert"><div class="affiliate-label">&#x1F9ED; NSM Picks</div><div class="mobile-affiliate-grid">'+bHTML+gHTML+'</div></div>';
}

async function resolveStoryImage(id){
  for(const ext of['webp','jpg','png']){
    try{const r=await fetch('/images/news/'+id+'.'+ext,{method:'HEAD'});if(r.ok)return'/images/news/'+id+'.'+ext}catch(e){}
  }
  return null;
}
async function resolveFallbackImage(headline,summary){
  try{
    if(!_imageRulesCache){const r=await fetch('/images/news/image-rules.json');if(r.ok)_imageRulesCache=await r.json()}
    if(_imageRulesCache){
      const h=((headline||'')+' '+(summary||'')).toLowerCase();
      for(const rule of(_imageRulesCache.keywords||[])){
        if(rule.match.some(kw=>{const esc=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return new RegExp('(?<![a-z])'+esc+'(?![a-z])','i').test(h)}))return'/images/news/'+rule.image;
      }
    }
  }catch(e){}
  return null;
}
async function getCardImage(id,headline,summary){
  const si=await resolveStoryImage(id);if(si)return si;
  return await resolveFallbackImage(headline,summary);
}

function convertRedditMarkdown(text){
  if(!text)return'';
  text=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/(?<!\*)\*(?!\s)([^*]+?)\*(?!\*)/g,'<em>$1</em>');
  text=text.replace(/\\n/g,'\n');text=text.replace(/\n{3,}/g,'\n\n');
  return text.trim();
}

async function submitFeedback(name,email,message,statusEl,formEl){
  statusEl.style.color='black';statusEl.textContent='Sending...';
  try{
    const res=await fetch('https://script.google.com/macros/s/AKfycbwr26uY61Dip94_QwzyLh1JDSIFdYHJgqL_scKGLdRd9O42VLDBvt2XzkA67tjphJrs/exec',{
      method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({name,email,message,subject:'NSM Story Queue Feedback'})
    });
    if(res.ok){statusEl.style.color='green';statusEl.textContent='&#x2705; Thanks!';if(formEl)formEl.reset()}
    else{statusEl.style.color='red';statusEl.textContent='&#x274C; Error.'}
  }catch(e){statusEl.style.color='red';statusEl.textContent='&#x274C; Could not connect.'}
}

function toggleReview(storyUrl,headline){
  const panel=document.getElementById('review-panel-'+storyUrl);if(!panel)return;
  panel.classList.toggle('open');
  if(panel.classList.contains('open')){
    const ta=panel.querySelector('textarea');
    if(ta&&!ta.value)ta.value='Story: '+headline+'\n\nNotes:\n';
    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}
window.toggleReview=toggleReview;

function toggleSummary(btn){
  const card=btn.closest('.story-card');
  const rest=card.querySelector('.story-summary-rest');if(!rest)return;
  const isOpen=rest.style.display!=='none';
  rest.style.display=isOpen?'none':'block';
  btn.textContent=isOpen?'Show more \u2193':'Show less \u2191';
}
window.toggleSummary=toggleSummary;

async function shareUnpublished(id,headline,btn){
  const base=window.location.origin+window.location.pathname;
  const url=base+'?id='+id;
  const hl=(headline||'').replace(/\n/g,' \u2014 ').trim();
  const text=hl+'\n'+url;
  const conf=btn.querySelector('.share-confirm');
  try{
    await navigator.clipboard.writeText(text);
    if(conf){conf.textContent='\u2705 Copied!';setTimeout(()=>{conf.textContent=''},2000)}
  }catch(e){if(conf){conf.textContent='\u274C Failed';setTimeout(()=>{conf.textContent=''},2000)}}
}
window.shareUnpublished=shareUnpublished;

window.submitReviewPanel=function(storyUrl,btn){
  const panel=document.getElementById('review-panel-'+storyUrl);if(!panel)return;
  const name=panel.querySelector('.rp-name').value.trim();
  const email=panel.querySelector('.rp-email').value.trim();
  const message=panel.querySelector('.rp-message').value.trim();
  const statusEl=panel.querySelector('.form-status');
  if(!email||!message){statusEl.style.color='red';statusEl.textContent='Email and message required.';return}
  submitFeedback(name,email,message,statusEl,null);
};

const slots=['00:30','06:15','08:45','10:15','11:45','13:15','15:45','17:15','18:30','20:45'];
function assignSlots(stories){
  let slotPointer=0,startDateEST;
  (function initSlot(){
    const nowEST=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
    const todayStr=nowEST.toLocaleDateString('en-CA',{timeZone:'America/New_York'});
    const jan=new Date(nowEST.getFullYear(),0,1),jul=new Date(nowEST.getFullYear(),6,1);
    const stdOffset=Math.max(jan.getTimezoneOffset(),jul.getTimezoneOffset());
    const isDST=nowEST.getTimezoneOffset()<stdOffset;
    const tzOffset=isDST?'-04:00':'-05:00';
    let found=false;
    for(let i=0;i<slots.length;i++){
      const slotDT=new Date(todayStr+'T'+slots[i]+':00'+tzOffset);
      if(slotDT>nowEST){slotPointer=i;startDateEST=slotDT;found=true;break}
    }
    if(!found){
      slotPointer=0;
      const tomorrow=new Date(nowEST);tomorrow.setDate(tomorrow.getDate()+1);
      const tStr=tomorrow.toLocaleDateString('en-CA',{timeZone:'America/New_York'});
      startDateEST=new Date(tStr+'T'+slots[0]+':00'+tzOffset);
    }
  })();
  let currentDay=startDateEST;
  const nowCheck=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  const janC=new Date(nowCheck.getFullYear(),0,1),julC=new Date(nowCheck.getFullYear(),6,1);
  const stdC=Math.max(janC.getTimezoneOffset(),julC.getTimezoneOffset());
  const isDSTC=nowCheck.getTimezoneOffset()<stdC;
  const tzOff=isDSTC?'-04:00':'-05:00';
  for(let i=0;i<stories.length;i++){
    const dateStr=currentDay.toLocaleDateString('en-CA',{timeZone:'America/New_York'});
    const scheduled=new Date(dateStr+'T'+slots[slotPointer]+':00'+tzOff);
    stories[i].scheduled=scheduled.toISOString();
    slotPointer++;
    if(slotPointer>=slots.length){
      slotPointer=0;
      const next=new Date(currentDay);next.setDate(next.getDate()+1);
      const nextDateStr=next.toLocaleDateString('en-CA',{timeZone:'America/New_York'});
      currentDay=new Date(nextDateStr+'T'+slots[0]+':00'+tzOff);
    }
  }
  return stories;
}

async function loadStories(){
  const storyId=new URLSearchParams(window.location.search).get('id');
  const container=document.getElementById('news-container');
  container.innerHTML='<div class="feed-loading"><div class="spinner"></div>Loading queue\u2026</div>';

  let stories;
  try{
    const res=await fetch('https://data.nospin.media/unpublished');
    if(!res.ok)throw new Error('HTTP '+res.status);
    stories=await res.json();
    if(!Array.isArray(stories))throw new Error('Unexpected format');
  }catch(e){
    container.innerHTML='<div class="feed-loading"><p style="color:#cc2200;font-weight:600;">Could not load queue: '+e.message+'</p></div>';
    return;
  }

  if(storyId){
    stories=stories.filter(r=>String(r.url).trim()===String(storyId).trim());
    if(stories.length===0){
      try{
        const chk=await fetch('https://dckmflnbprhmaqysuued.supabase.co/rest/v1/news_posts?select=url&url=eq.'+storyId+'&used=eq.true',{headers:{apikey:SB_KEY}});
        const chkData=await chk.json();
        if(chkData.length>0){window.location.replace('/story.html?story='+storyId);return}
      }catch(e){}
      container.innerHTML='<div class="feed-loading"><p>Story not found in queue.</p><br><a href="/news.html" style="color:var(--blue);font-weight:600;">&#x1F50E; Search archive</a></div>';
      return;
    }
  }

  stories.sort((a,b)=>parseInt(a.order)-parseInt(b.order));
  stories=stories.filter(s=>s.headline);
  stories=assignSlots(stories);

  const countEl=document.getElementById('queue-count');
  if(countEl)countEl.textContent=stories.length+' stor'+(stories.length===1?'y':'ies')+' queued';

  const kwData=await loadKeywordAffiliateData();
  const{bookRule,gearRule}=findTopTwoRules(stories,kwData.rules||[]);
  await loadAllAffiliateTiles(bookRule,gearRule);

  const imgUrls=await Promise.all(stories.map(s=>{
    const timeout=new Promise(r=>setTimeout(()=>r(null),3000));
    return Promise.race([getCardImage(s.url,s.headline,s.summary).catch(()=>null),timeout]);
  }));

  const storyRules=stories.map(story=>{
    const text=[story.headline||'',story.summary||''].join(' ');
    const sc=(kwData.rules||[]).map(rule=>({rule,score:(rule.keywords||[]).filter(kw=>wordMatch(text,kw)).length})).filter(s=>s.score>0).sort((a,b)=>b.score-a.score);
    return sc[0]?.rule||null;
  });

  const groups={};
  stories.forEach((r,i)=>{
    const date=new Date(r.scheduled).toLocaleDateString('en-CA',{timeZone:'America/New_York'});
    if(!groups[date])groups[date]=[];
    groups[date].push({story:r,thumb:imgUrls[i],storyRule:storyRules[i]});
  });

  container.innerHTML='';
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const weekdays=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const nowEST=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  let firstSlotMarked=false,cardCount=0,mobileInserted=false;

  for(const date in groups){
    const[y,m,d]=date.split('-');
    const dt=new Date(Number(y),Number(m)-1,Number(d),12,0,0);
    const label=weekdays[dt.getDay()]+', '+months[dt.getMonth()]+' '+dt.getDate()+', '+dt.getFullYear();
    const dateGroup=document.createElement('div');
    dateGroup.className='date-group';
    dateGroup.innerHTML='<div class="date-header">'+label+'</div>';

    groups[date].forEach(({story,thumb,storyRule})=>{
      const sched=new Date(story.scheduled);
      const isNext=!firstSlotMarked&&sched>nowEST;
      if(isNext)firstSlotMarked=true;
      const timeLabel=sched.toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit'});
      const topic=story.topic||'world';
      const kw=KW_IMG[topic]||'world';
      const bgStyle=thumb
        ?'background-image:url(\''+thumb+'\'),url(\''+IMG_K+kw+'.jpg\');background-size:cover;background-position:center;'
        :'background-image:url(\''+IMG_K+kw+'.jpg\');background-size:cover;background-position:center;';

      const safeHL=(story.headline||'').replace(/'/g,"\\'").replace(/\n/g,' ').replace(/\r/g,'');
      const safeUrl=String(story.url||'').replace(/'/g,"\\'");

      const hlRaw=(story.headline||'').trim();
      const nlIdx=hlRaw.indexOf('\n');
      const hl1=nlIdx>-1?hlRaw.substring(0,nlIdx).trim():hlRaw;
      const hl2=nlIdx>-1?hlRaw.substring(nlIdx+1).trim():'';

      const fullMd=convertRedditMarkdown(story.summary||'');
      const paras=fullMd.split(/\n\n+/);
      const firstPara=paras[0]||'';
      const restPara=paras.slice(1).join('\n\n');
      const hasMore=restPara.trim().length>0;

      let badgeHTML='';
      if(storyRule){
        const bl=storyRule.books?.category_label||'Book match';
        const gl=storyRule.gear?.category_label||'';
        badgeHTML='<div style="margin-bottom:.4rem;">'
          +(storyRule.books?'<span class="affiliate-badge book">&#x1F4DA; '+bl+'</span>':'')
          +(storyRule.gear?' <span class="affiliate-badge gear">&#x1F527; '+gl+'</span>':'')
          +'</div>';
      }else{
        badgeHTML='<div style="margin-bottom:.4rem;"><span class="affiliate-badge none">&#x1F4ED; No affiliate match</span></div>';
      }

      const card=document.createElement('div');
      card.className='story-card';
      if(storyId&&String(story.url).trim()===String(storyId).trim())card.style.outline='2px solid var(--blue)';

      card.innerHTML=
        '<div class="card-color-top tp-bg-'+(topic||'world')+'">'
        +'<div class="card-top-bg" style="'+bgStyle+'"></div>'
        +'<div class="card-top-scrim"></div>'
        +'<div class="card-top-content">'
        +'<div class="slot-pill"><div class="slot-dot'+(isNext?' next':'')+'"></div>'+(isNext?'<strong>NEXT UP</strong> &middot; ':'')+timeLabel+' EST</div>'
        +'<span class="card-headline">'+hl1+'</span>'
        +(hl2?'<span class="card-hl2">'+hl2+'</span>':'')
        +'</div></div>'
        +'<div class="card-body">'
        +badgeHTML
        +'<div class="story-summary-preview">'+firstPara+'</div>'
        +(hasMore?'<div class="story-summary-rest" style="display:'+(storyId?'block':'none')+';">'+restPara+'</div>':'')
        +'<div class="card-footer">'
        +(hasMore?'<button class="story-link" onclick="toggleSummary(this)">'+(storyId?'Show less \u2191':'Show more \u2193')+'</button>':'<span></span>')
        +'<button class="btn-review" onclick="toggleReview(\''+safeUrl+'\',\''+safeHL+'\')">&#x270F;&#xFE0F; Review</button>'
        +'<button class="story-link" onclick="shareUnpublished(\''+safeUrl+'\',\''+safeHL+'\',this)">&#x1F517; Share <span class="share-confirm"></span></button>'
        +'</div></div>';

      const reviewPanel=document.createElement('div');
      reviewPanel.className='feedback-panel';
      reviewPanel.id='review-panel-'+story.url;
      reviewPanel.innerHTML=
        '<h4>&#x270F;&#xFE0F; Review: '+hl1+'</h4>'
        +'<input type="text" class="rp-name" placeholder="Your first name">'
        +'<input type="email" class="rp-email" placeholder="you@email.com">'
        +'<textarea class="rp-message" rows="4" placeholder="Feedback or notes on this story..."></textarea>'
        +'<p class="form-status"></p>'
        +'<button type="submit" class="rp-submit" onclick="submitReviewPanel(\''+safeUrl+'\',this)">&#x1F4AC; Send Review</button>';

      dateGroup.appendChild(card);
      dateGroup.appendChild(reviewPanel);
      cardCount++;

      const mobileThreshold=storyId?1:3;
      if(window.innerWidth<=900&&cardCount===mobileThreshold&&!mobileInserted&&window.mobileAffiliateHTML){
        const ins=document.createElement('div');ins.innerHTML=window.mobileAffiliateHTML;
        dateGroup.appendChild(ins.firstElementChild);mobileInserted=true;
      }
    });
    container.appendChild(dateGroup);
  }
}

function initGlobalFeedback(){
  const form=document.getElementById('globalFeedbackForm');if(!form)return;
  form.addEventListener('submit',async function(e){
    e.preventDefault();
    await submitFeedback(
      document.getElementById('gf-name').value.trim(),
      document.getElementById('gf-email').value.trim(),
      document.getElementById('gf-message').value.trim(),
      document.getElementById('gf-status'),form
    );
  });
}

document.addEventListener('DOMContentLoaded',function(){
  fetch('header.html').then(r=>r.text()).then(html=>{
    document.getElementById('site-header').innerHTML=html;
    const ham=document.getElementById('hamburger'),nav=document.getElementById('mobile-nav');
    if(ham&&nav){
      ham.onclick=()=>{nav.classList.toggle('open');ham.classList.toggle('active')};
      nav.querySelectorAll('a').forEach(a=>{a.onclick=()=>{nav.classList.remove('open');ham.classList.remove('active')}});
    }
    loadStories();
    initGlobalFeedback();
  });
});
</script>
</head>

<div class="page-wrap">

  <div class="queue-header">
    <span style="font-size:1.5rem;line-height:1">&#x1F9ED;</span>
    <span class="queue-title">No Spin Media News Queue</span>
    <span class="queue-count" id="queue-count"></span>
  </div>

  <div id="news-container">
    <div class="feed-loading"><div class="spinner"></div>Loading queue&hellip;</div>
  </div>

  <div class="global-feedback">
    <h2>&#x1F499; General Feedback</h2>
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:.75rem;">Questions, tips, or general comments? Reach us here or at <strong>feedback@nospin.media</strong></p>
    <form id="globalFeedbackForm">
      <input type="text" id="gf-name" placeholder="Your first name">
      <input type="email" id="gf-email" placeholder="you@email.com" required>
      <textarea id="gf-message" rows="4" placeholder="Your feedback&hellip;" required></textarea>
      <p id="gf-status" class="form-status"></p>
      <button type="submit">&#x1F4AC; Send Feedback</button>
    </form>
  </div>

</div>
<footer>
  &copy; 2026 &#x1F9ED; No Spin Media. Independent. Truth-focused.<br>
  <span style="font-size:.72rem;color:#bbb;">Some links are affiliate links. As an Amazon Associate we earn from qualifying purchases.</span>
</footer>
