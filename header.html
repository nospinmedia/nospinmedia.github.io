<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    header {
        box-sizing: border-box !important;
        background: #111 !important;
        color: #fff !important;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        padding: 0.5rem 2rem !important;
        min-height: 70px !important;
        width: 100% !important;
        margin: 0 !important;
        top: 0 !important;
        left: 0 !important;
        position: fixed !important;
        z-index: 1000 !important;
    }

    .mobile-social {
        display: flex;
        flex-direction: column;
    }

    .mobile-social a {
        color: #fff;
        padding: 10px 20px;
        text-decoration: none;
        font-weight: bold;
        border-bottom: 1px solid #333;
        text-align: right;
    }

    .header-logo-text {
        font-family: Arial, sans-serif !important;
        font-size: 2.8rem !important;
        font-weight: bold !important;
        color: #fff !important;
        letter-spacing: -0.05em !important;
        white-space: nowrap !important;
        margin: 0 !important;
        line-height: 1 !important;
        padding: 0 !important;
        cursor: pointer;
        text-decoration: none !important;
    }

    .header-logo-text a {
        color: inherit !important;
        text-decoration: none !important;
    }

    header nav {
        display: flex !important;
        align-items: center !important;
    }

    header nav a {
        color: #fff !important;
        margin-left: 20px !important;
        text-decoration: none !important;
        font-weight: bold !important;
    }

    /* Internal links — hidden by default */
    .internal-nav-link {
        display: none !important;
        color: #ffcc00 !important;
        margin-left: 20px !important;
        text-decoration: none !important;
        font-weight: bold !important;
    }

    .internal-nav-link.visible {
        display: inline !important;
    }

    .mobile-nav .internal-nav-link {
        display: none !important;
        color: #ffcc00 !important;
        padding: 10px 20px;
        text-decoration: none;
        font-weight: bold;
        border-bottom: 1px solid #333;
        text-align: right;
    }

    .mobile-nav .internal-nav-link.visible {
        display: block !important;
    }

    .hamburger-menu {
        display: none;
        font-size: 2rem;
        cursor: pointer;
        color: #fff;
        padding: 5px;
        z-index: 1001;
        transition: color 0.3s;
    }

    .hamburger-menu.active { color: #ff5733; }

    .mobile-nav {
        flex-direction: column;
        position: fixed !important;
        top: 70px;
        right: 0;
        background: #222;
        width: 100%;
        max-width: 300px;
        box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        padding: 1rem 0;
        z-index: 1002 !important;
        transform: translateX(100%);
        transition: transform 0.3s ease;
    }

    .mobile-nav.open { transform: translateX(0); }

    .mobile-nav a {
        color: #fff;
        padding: 10px 20px;
        text-decoration: none;
        font-weight: bold;
        border-bottom: 1px solid #333;
        text-align: right;
    }

    @media (max-width: 768px) {
        header {
            padding: 0.5rem 1rem !important;
            justify-content: space-between !important;
        }
        .header-logo-text {
            font-size: 1.5rem !important;
            flex-shrink: 0;
        }
        header nav { display: none !important; }
        .hamburger-menu { display: block; }
        .mobile-nav {
            display: flex;
            flex-direction: column;
        }
    }
    </style>
</head>
<body>
    <header>
        <a href="https://nospin.media/index.html" class="header-logo-text">🧭 No Spin Media</a>
        <div class="hamburger-menu" id="hamburger">&#9776;</div>

        <nav id="desktop-nav">
            <a href="https://nospin.media/index.html">Home</a>
            <a href="https://nospin.media/news.html">Archive</a>
            <a href="https://nospin.media/new-england.html">New England</a>
            <a href="https://nospin.media/daily.html">Daily</a>
            <a href="https://nospin.media/utilities/index.html">Utilities</a>
            <a href="https://nospin.media/sponsor.html">Support</a>
            <a href="https://nospin.media/about.html">About</a>
            <a href="https://nospin.media/ai.html">AI Transparency</a>
            <!-- Internal links — shown when local/VPN detected -->
            <a id="desktop-dropoff"
               class="internal-nav-link"
               href="http://192.168.194.152:9090/dropoff"
               target="_blank">📥 Dropoff</a>
            <a id="desktop-images"
               class="internal-nav-link"
               href="http://192.168.194.152:9090/image-upload"
               target="_blank">🖼️ Images</a>
            <span class="social-icons">
                <a href="https://reddit.com/r/NoSpinMedia" target="_blank" title="Reddit">👽</a>
                <a href="https://bsky.app/profile/nospinmedia.bsky.social" target="_blank" title="Bluesky">🦋</a>
                <a href="https://www.threads.com/@nospinmedia" target="_blank" title="Threads">🧵</a>
                <a href="https://facebook.com/NoSpinNewsAI" target="_blank" title="Facebook">📘</a>
            </span>
        </nav>
    </header>

    <div class="mobile-nav" id="mobile-nav">
        <a href="https://nospin.media/index.html">Home</a>
        <a href="https://nospin.media/news.html">Archive</a>
        <a href="https://nospin.media/new-england.html">New England</a>
        <a href="https://nospin.media/daily.html">Daily</a>
        <a href="https://nospin.media/utilities/index.html">Utilities</a>
        <a href="https://nospin.media/sponsor.html">Support</a>
        <a href="https://nospin.media/about.html">About</a>
        <a href="https://nospin.media/ai.html">AI Transparency</a>
        <!-- Internal links in mobile nav -->
        <a id="mobile-dropoff"
           class="internal-nav-link"
           href="http://192.168.194.152:9090/dropoff"
           target="_blank">📥 Dropoff</a>
        <a id="mobile-images"
           class="internal-nav-link"
           href="http://192.168.194.152:9090/image-upload"
           target="_blank">🖼️ Images</a>
        <div class="mobile-social">
            <a href="https://reddit.com/r/NoSpinMedia" target="_blank">👽 Reddit</a>
            <a href="https://bsky.app/profile/nospinmedia.bsky.social" target="_blank">🦋 Bluesky</a>
            <a href="https://www.threads.com/@nospinmedia" target="_blank">🧵 Threads</a>
            <a href="https://facebook.com/NoSpinNewsAI" target="_blank">📘 Facebook</a>
        </div>
    </div>

<script>
/* ══════════════════════════════════════════
   HAMBURGER
   ══════════════════════════════════════════ */
function initHamburger() {
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobile-nav');
    if (!hamburger || !mobileNav) return;
    hamburger.onclick = () => {
        mobileNav.classList.toggle('open');
        hamburger.classList.toggle('active');
    };
    mobileNav.querySelectorAll('a').forEach(link => {
        link.onclick = () => {
            mobileNav.classList.remove('open');
            hamburger.classList.remove('active');
        };
    });
}

/* ══════════════════════════════════════════
   INTERNAL LINK DETECTION
   
   The browser blocks fetch() from HTTPS pages
   to HTTP addresses (mixed content policy), so
   we can't directly probe 192.168.x.x from
   nospin.media via fetch.

   Solution: localStorage handshake.

   STEP 1 — When this header loads inside a
   192.168.x.x page, window.parent (or the page
   itself) has a 192.168 hostname. We detect
   that and write a timestamp to localStorage.

   STEP 2 — When this header loads on nospin.media,
   we read the timestamp. If it's fresh (< 8 hrs),
   the user was recently on the local network
   and we show the internal links.

   This works because localStorage is shared
   across all pages on the same browser — both
   nospin.media and 192.168.x.x pages share the
   same browser storage on your device.
   ══════════════════════════════════════════ */
(function detectAndShowInternalLinks() {
    const LOCAL_IP   = "192.168.194.152";
    const FLAG_KEY   = "nsm_local_seen";
    const MAX_AGE_MS = 8 * 60 * 60 * 1000; // 8 hours

    try {
        /* STEP 1: Are we currently on the local network?
           Check the hostname of the page that loaded this header.
           When header.html is fetched by a 192.168 page and
           injected via innerHTML, the scripts run in the context
           of that page — so window.location.hostname is the
           192.168 address. */
        const currentHost = window.location.hostname;
        const isLocalNow  = (currentHost === LOCAL_IP);

        if (isLocalNow) {
            /* Write/refresh the timestamp */
            localStorage.setItem(FLAG_KEY, Date.now().toString());
        }

        /* STEP 2: Check if flag is fresh enough to show links */
        const stored = parseInt(localStorage.getItem(FLAG_KEY) || "0");
        const age    = Date.now() - stored;
        const isRecent = stored > 0 && age < MAX_AGE_MS;

        if (isLocalNow || isRecent) {
            /* Show internal links in both desktop and mobile nav */
            [
                "desktop-dropoff",
                "desktop-images",
                "mobile-dropoff",
                "mobile-images"
            ].forEach(function(id) {
                var el = document.getElementById(id);
                if (el) el.classList.add("visible");
            });
        }

    } catch(e) {
        /* localStorage blocked (private browsing etc) — fail silently */
    }
})();

/* Run hamburger init immediately — it may also be called
   by the parent page after header injection */
initHamburger();
</script>

</body>
</html>
