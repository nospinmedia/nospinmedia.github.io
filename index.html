<script>

/* ── Emoji → category map ── */
const emojiMap = {
  "🚀": "space",
  "🌙": "space",
  "🔭": "space",
  "✈️": "military",
  "🪖": "military",
  "⚔️": "military",
  "🛫": "military",
  "🛢️": "energy",
  "⛽": "energy",
  "🔥": "energy",
  "⚖️": "politics",
  "🏛️": "politics",
  "🗳️": "politics",
  "💊": "health",
  "🧠": "health",
  "🦦": "health",
  "🤖": "technology",
  "📱": "technology",
  "💵": "economy",
  "📉": "economy",
  "🏦": "economy"
};

/* ── Category → Amazon keywords ── */
const bookKeywords = {
  space:      "space exploration books",
  military:   "military aviation books",
  energy:     "oil geopolitics books",
  politics:   "political history books",
  health:     "medical science books",
  technology: "artificial intelligence books",
  economy:    "economics financial books",
  default:    "world history books"
};

const gearKeywords = {
  space:      "telescope astronomy",
  military:   "emergency preparedness gear",
  energy:     "emergency weather radio",
  politics:   "emergency preparedness kit",
  health:     "first aid kit emergency",
  technology: "home electronics gadgets",
  economy:    "emergency preparedness kit",
  default:    "emergency preparedness kit"
};

function detectCategory(headlines){
  const counts = {};
  headlines.forEach(h => {
    /* grab first emoji — may be 1 or 2 codepoints */
    const chars = [...h];
    for(let i = 0; i < Math.min(3, chars.length); i++){
      const ch = chars[i];
      /* handle multi-codepoint emoji like ✈️ */
      const twoChar = chars[i] + (chars[i+1] || "");
      const cat = emojiMap[twoChar] || emojiMap[ch];
      if(cat){
        counts[cat] = (counts[cat] || 0) + 1;
        break;
      }
    }
  });
  if(Object.keys(counts).length === 0) return "default";
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
}

function injectAmazonWidget(containerId, keyword, category){
  const el = document.getElementById(containerId);
  if(!el) return;

  el.innerHTML = "";

  const s1 = document.createElement("script");
  s1.type = "text/javascript";
  s1.text = `
    amzn_assoc_placement = "${containerId}";
    amzn_assoc_tracking_id = "nospinmedia-20";
    amzn_assoc_ad_mode = "search";
    amzn_assoc_ad_type = "smart";
    amzn_assoc_marketplace = "amazon";
    amzn_assoc_region = "US";
    amzn_assoc_default_search_phrase = "${keyword}";
    amzn_assoc_default_category = "${category}";
  `;
  el.appendChild(s1);
}

function buildSidebars(headlines){
  const cat = detectCategory(headlines);

  const bookKw  = bookKeywords[cat]  || bookKeywords.default;
  const gearKw  = gearKeywords[cat]  || gearKeywords.default;

  /* Left — books */
  const leftBox = document.getElementById("left-ad");
  leftBox.innerHTML = `
    <div class="affiliate-box">
      <h4>📚 Recommended Reading</h4>
      <div id="amzn-books"></div>
    </div>
  `;
  injectAmazonWidget("amzn-books", bookKw, "Books");

  /* Right — gear */
  const rightBox = document.getElementById("right-ad");
  rightBox.innerHTML = `
    <div class="affiliate-box">
      <h4>🛒 Related Items</h4>
      <div id="amzn-gear"></div>
    </div>
  `;
  injectAmazonWidget("amzn-gear", gearKw, "All");
}

function convertRedditMarkdown(text){
  if(!text) return "";
  text=text.replace(/\\n\\n/g,"\n\n");
  text=text.replace(/\\n/g,"\n");
  text=text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
  text=text.replace(/(?<!\*)\*(?!\s)([^*]+?)\*(?!\*)/g,"<em>$1</em>");
  return text;
}

async function shareStory(url, headline, btn) {
  const fullUrl = `${window.location.origin}/story.html?story=${url}`;
  try {
    await navigator.clipboard.writeText(fullUrl);
    btn.innerHTML = "✅ Copied!";
    setTimeout(() => { btn.innerHTML = "🔗 Share this story"; }, 2000);
  } catch (err) {
    alert("Could not copy link. Please copy it manually from the address bar.");
  }
}

async function loadStories(){

  const apiURL="https://dckmflnbprhmaqysuued.supabase.co/rest/v1/news_posts?select=headline,summary,posted_at,url&used=eq.true&order=posted_at.desc&limit=20";

  const res=await fetch(apiURL,{
    headers:{apikey:"sb_publishable_5uAn1PjQGf2Vmr7qpwGcdg_LOtygPRB"}
  });

  const stories=await res.json();

  /* Build sidebars from top 3 headlines */
  const top3 = stories.slice(0,3).map(s => s.headline || "");
  buildSidebars(top3);

  const container=document.getElementById("news-container");
  container.innerHTML="";

  stories.forEach(s=>{

    let cleanText=convertRedditMarkdown(s.summary);
    let firstParagraph=cleanText.split("\n\n")[0];

    const date=new Date(s.posted_at).toLocaleDateString("en-US",{
      year:"numeric",
      month:"long",
      day:"numeric"
    });

    const card=document.createElement("div");
    card.className="story-card";
    card.onclick=(e)=>{
      if(e.target.closest(".story-link")) return;
      window.location=`story.html?story=${s.url}`;
    };

    const safeHeadline=(s.headline||"").replace(/'/g,"\\'").replace(/\n/g," ").replace(/\r/g,"");

    card.innerHTML=`
      <h3>
        <a href="story.html?story=${s.url}" class="headline-link">${s.headline}</a>
      </h3>
      <div class="story-date">${date}</div>
      <div class="story-summary">${firstParagraph}</div>
      <div class="card-footer">
        <a class="story-link" href="story.html?story=${s.url}">Read full story →</a>
        <a class="story-link" onclick="event.stopPropagation(); shareStory('${s.url}', '${safeHeadline}', this)" style="cursor:pointer;">🔗 Share this story</a>
      </div>
    `;

    container.appendChild(card);

  });

}

document.addEventListener("DOMContentLoaded", function() {
  fetch("header.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("site-header").innerHTML = html;

      const hamburger = document.getElementById("hamburger");
      const mobileNav = document.getElementById("mobile-nav");

      if (hamburger && mobileNav) {
        hamburger.onclick = () => {
          mobileNav.classList.toggle("open");
          hamburger.classList.toggle("active");
        };
        mobileNav.querySelectorAll("a").forEach(link => {
          link.onclick = () => {
            mobileNav.classList.remove("open");
            hamburger.classList.remove("active");
          };
        });
      }

      loadStories();
    });
});

</script>
