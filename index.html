<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>No Spin Media</title>
<link rel="stylesheet" href="style.css"/>

<script async
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7053277983719011"
crossorigin="anonymous"></script>

 
<script>

function convertRedditMarkdown(text){

if(!text) return "";

text=text.replace(/\\n\\n/g,"\n\n");
text=text.replace(/\\n/g,"\n");

text=text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
text=text.replace(/(?<!\*)\*(?!\s)([^*]+?)\*(?!\*)/g,"<em>$1</em>");

return text;

}

  .headline-link{
color:#222;
text-decoration:none;
}

.headline-link:hover{
text-decoration:underline;
}
  
  async function loadStories(){

const apiURL="https://dckmflnbprhmaqysuued.supabase.co/rest/v1/news_posts?select=headline,summary,posted_at&used=eq.true&order=posted_at.desc&limit=20";

const res=await fetch(apiURL,{
headers:{apikey:"sb_publishable_5uAn1PjQGf2Vmr7qpwGcdg_LOtygPRB"}
});

const stories=await res.json();

const container=document.getElementById("news-container");

container.innerHTML="";

stories.forEach(s=>{

let cleanText=convertRedditMarkdown(s.summary);

let firstParagraph=cleanText.split("\n\n")[0];

const date=new Date(s.posted_at).toLocaleDateString("en-US",{
year:"numeric",
month:"long",
day:"numeric"
});

const card=document.createElement("div");

card.className="story-card";

card.innerHTML=`

<h3>
<a href="#" class="headline-link">${s.headline}</a>
</h3>

<div class="story-date">${date}</div>

<div class="story-summary">${firstParagraph}</div>

<a class="story-link" href="#" title="Full story page will be added later">
Read full story →
</a>

`;

container.appendChild(card);

});

}

document.addEventListener("DOMContentLoaded",function(){

fetch("header.html")
.then(res=>res.text())
.then(html=>{
document.getElementById("site-header").innerHTML=html;
loadStories();
});

});

</script>
  <style>

.ad-box{

footer{
