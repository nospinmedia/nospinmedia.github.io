<script>

/* ── Emoji → category map ── */
const emojiMap = {
  "🚀": "space",
  "🌙": "space",
  "🔭": "space",
  "✈️": "military",
  "🪖": "military",
  "⚔️": "military",
  "🛫": "military",
  "🛢️": "energy",
  "⛽": "energy",
  "🔥": "energy",
  "⚖️": "politics",
  "🏛️": "politics",
  "🗳️": "politics",
  "💊": "health",
  "🧠": "health",
  "🦦": "health",
  "🤖": "technology",
  "📱": "technology",
  "💵": "economy",
  "📉": "economy",
  "🏦": "economy"
};

const bookLinks = {
  space:      [{text:"Space exploration books", k:"space+exploration+books"},{text:"Astronomy books", k:"astronomy+books"},{text:"NASA history books", k:"NASA+history+books"}],
  military:   [{text:"Military aviation books", k:"military+aviation+books"},{text:"Air combat history", k:"air+combat+history+books"},{text:"Modern fighter jets", k:"modern+fighter+jets+books"}],
  energy:     [{text:"Oil geopolitics books", k:"oil+geopolitics+books"},{text:"Energy crisis history", k:"energy+crisis+history+books"},{text:"Middle East politics books", k:"middle+east+politics+books"}],
  politics:   [{text:"Political history books", k:"political+history+books"},{text:"Government accountability books", k:"government+accountability+books"},{text:"Constitutional law books", k:"constitutional+law+books"}],
  health:     [{text:"Medical science books", k:"medical+science+books"},{text:"Public health books", k:"public+health+books"},{text:"Pandemic history books", k:"pandemic+history+books"}],
  technology: [{text:"Artificial intelligence books", k:"artificial+intelligence+books"},{text:"Tech industry books", k:"silicon+valley+books"},{text:"Cybersecurity books", k:"cybersecurity+books"}],
  economy:    [{text:"Economics books", k:"economics+books"},{text:"Financial crisis books", k:"financial+crisis+books"},{text:"Federal Reserve books", k:"federal+reserve+books"}],
  default:    [{text:"World history books", k:"world+history+books"},{text:"Current events books", k:"current+events+books"},{text:"Journalism books", k:"journalism+books"}]
};

const gearLinks = {
  space:      [{text:"Telescopes", k:"telescope+astronomy"},{text:"Star charts", k:"star+chart+maps"},{text:"Night sky guides", k:"night+sky+guide"}],
  military:   [{text:"Emergency weather radio", k:"emergency+weather+radio"},{text:"Emergency preparedness kit", k:"emergency+preparedness+kit"},{text:"Portable power bank", k:"portable+power+bank"}],
  energy:     [{text:"Emergency weather radio", k:"emergency+weather+radio"},{text:"Solar power charger", k:"solar+power+charger"},{text:"Emergency preparedness kit", k:"emergency+preparedness+kit"}],
  politics:   [{text:"Emergency preparedness kit", k:"emergency+preparedness+kit"},{text:"First aid kit", k:"first+aid+kit"},{text:"Portable weather radio", k:"portable+weather+radio"}],
  health:     [{text:"First aid kit", k:"first+aid+kit"},{text:"Blood pressure monitor", k:"blood+pressure+monitor"},{text:"Pulse oximeter", k:"pulse+oximeter"}],
  technology: [{text:"Home electronics", k:"home+electronics"},{text:"Smart home devices", k:"smart+home+devices"},{text:"Portable charger", k:"portable+charger"}],
  economy:    [{text:"Emergency preparedness kit", k:"emergency+preparedness+kit"},{text:"Portable power bank", k:"portable+power+bank"},{text:"Emergency weather radio", k:"emergency+weather+radio"}],
  default:    [{text:"Emergency preparedness kit", k:"emergency+preparedness+kit"},{text:"First aid kit", k:"first+aid+kit"},{text:"Emergency weather radio", k:"emergency+weather+radio"}]
};

function detectCategory(headlines){
  const counts = {};
  headlines.forEach(h => {
    const chars = [...h];
    for(let i = 0; i < Math.min(3, chars.length); i++){
      const ch = chars[i];
      const twoChar = chars[i] + (chars[i+1] || "");
      const cat = emojiMap[twoChar] || emojiMap[ch];
      if(cat){
        counts[cat] = (counts[cat] || 0) + 1;
        break;
      }
    }
  });
  if(Object.keys(counts).length === 0) return "default";
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
}

function buildSidebars(headlines){
  const cat = detectCategory(headlines);
  const tag = "nospinmedia-20";

  const books = bookLinks[cat] || bookLinks.default;
  const gear  = gearLinks[cat] || gearLinks.default;

  const makeLinks = (items) => items.map(item =>
    `<a href="https://www.amazon.com/s?k=${item.k}&tag=${tag}" target="_blank" rel="noopener" style="display:block;margin-bottom:10px;font-weight:bold;color:#0066cc;text-decoration:none;font-size:.9rem;">${item.text} →</a>`
  ).join("");

  document.getElementById("left-ad").innerHTML = `
    <div class="affiliate-box">
      <h4>📚 Recommended Reading</h4>
      ${makeLinks(books)}
      <p style="font-size:.7rem;color:#999;margin-top:8px;">As an Amazon Associate I earn from qualifying purchases.</p>
    </div>`;

  document.getElementById("right-ad").innerHTML = `
    <div class="affiliate-box">
      <h4>🛒 Related Items</h4>
      ${makeLinks(gear)}
      <p style="font-size:.7rem;color:#999;margin-top:8px;">As an Amazon Associate I earn from qualifying purchases.</p>
    </div>`;
}

function convertRedditMarkdown(text){
  if(!text) return "";
  text=text.replace(/\\n\\n/g,"\n\n");
  text=text.replace(/\\n/g,"\n");
  text=text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
  text=text.replace(/(?<!\*)\*(?!\s)([^*]+?)\*(?!\*)/g,"<em>$1</em>");
  return text;
}

async function shareStory(url, headline, btn) {
  const fullUrl = `${window.location.origin}/story.html?story=${url}`;
  try {
    await navigator.clipboard.writeText(fullUrl);
    btn.innerHTML = "✅ Copied!";
    setTimeout(() => { btn.innerHTML = "🔗 Share this story"; }, 2000);
  } catch (err) {
    alert("Could not copy link. Please copy it manually from the address bar.");
  }
}

async function loadStories(){

  const apiURL="https://dckmflnbprhmaqysuued.supabase.co/rest/v1/news_posts?select=headline,summary,posted_at,url&used=eq.true&order=posted_at.desc&limit=20";

  const res=await fetch(apiURL,{
    headers:{apikey:"sb_publishable_5uAn1PjQGf2Vmr7qpwGcdg_LOtygPRB"}
  });

  const stories=await res.json();

  const top3 = stories.slice(0,3).map(s => s.headline || "");
  buildSidebars(top3);

  const container=document.getElementById("news-container");
  container.innerHTML="";

  stories.forEach(s=>{

    let cleanText=convertRedditMarkdown(s.summary);
    let firstParagraph=cleanText.split("\n\n")[0];

    const date=new Date(s.posted_at).toLocaleDateString("en-US",{
      year:"numeric",
      month:"long",
      day:"numeric"
    });

    const card=document.createElement("div");
    card.className="story-card";
    card.onclick=(e)=>{
      if(e.target.closest(".story-link")) return;
      window.location=`story.html?story=${s.url}`;
    };

    const safeHeadline=(s.headline||"").replace(/'/g,"\\'").replace(/\n/g," ").replace(/\r/g,"");

    card.innerHTML=`
      <h3>
        <a href="story.html?story=${s.url}" class="headline-link">${s.headline}</a>
      </h3>
      <div class="story-date">${date}</div>
      <div class="story-summary">${firstParagraph}</div>
      <div class="card-footer">
        <a class="story-link" href="story.html?story=${s.url}">Read full story →</a>
        <a class="story-link" onclick="event.stopPropagation(); shareStory('${s.url}', '${safeHeadline}', this)" style="cursor:pointer;">🔗 Share this story</a>
      </div>
    `;

    container.appendChild(card);

  });

}

document.addEventListener("DOMContentLoaded", function() {
  fetch("header.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("site-header").innerHTML = html;

      const hamburger = document.getElementById("hamburger");
      const mobileNav = document.getElementById("mobile-nav");

      if (hamburger && mobileNav) {
        hamburger.onclick = () => {
          mobileNav.classList.toggle("open");
          hamburger.classList.toggle("active");
        };
        mobileNav.querySelectorAll("a").forEach(link => {
          link.onclick = () => {
            mobileNav.classList.remove("open");
            hamburger.classList.remove("active");
          };
        });
      }

      loadStories();
    });
});

</script>
